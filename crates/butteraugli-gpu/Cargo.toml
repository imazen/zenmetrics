[package]
name = "butteraugli-gpu"
version = "0.0.1"
description = "Multi-vendor GPU implementation of the butteraugli perceptual image quality metric, via CubeCL"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license = "MIT"
rust-version = "1.92"
publish = false

[features]
default = ["cuda", "wgpu", "cpu", "fast-reduction"]
cuda = ["cubecl/cuda"]
wgpu = ["cubecl/wgpu"]
hip = ["cubecl/hip"]
cpu = ["cubecl/cpu"]
# Use Atomic<f32>::fetch_add for the per-octave reduction. Works on
# CUDA / Windows DX12 (real driver) / HIP. Silently no-ops on Metal —
# disable when targeting Metal:
#   cargo build -p butteraugli-gpu --no-default-features --features wgpu
fast-reduction = []
# Bench-only feature: pulls in the CUDA-only `butteraugli-cuda` and
# `cudarse-*` workspace crates so `bench_three_way` can compare against
# them. Off by default so non-CUDA hosts (macOS / Windows wgpu CI)
# don't try to build CUDA SDK bindings.
bench-cuda = ["dep:butteraugli-cuda", "dep:cudarse-driver", "dep:cudarse-npp"]

[dependencies]
cubecl = { version = "0.10.0-pre.4", default-features = false, features = ["std"] }

[dev-dependencies]
butteraugli = "0.9.2"
bytemuck = "1"
imgref = "1"
rgb = "0.8"
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }

# CUDA-only dev-deps, gated behind `bench-cuda` (used by
# `bench_three_way` only). Kept as optional regular deps so cargo
# feature resolution can drop them on non-CUDA hosts.
[dependencies.butteraugli-cuda]
path = "../butteraugli-cuda"
optional = true
[dependencies.cudarse-driver]
workspace = true
optional = true
[dependencies.cudarse-npp]
workspace = true
features = ["isu", "ial", "idei", "if", "ist"]
optional = true

# bench_three_way uses butteraugli-cuda for direct comparison. Skip the
# example unless `bench-cuda` is enabled.
[[example]]
name = "bench_three_way"
required-features = ["bench-cuda"]
