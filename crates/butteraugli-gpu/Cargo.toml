required-features = ["cubecl-types"]

[[example]]
name = "bench_warm_ref"
required-features = ["cubecl-types"]

[[example]]
name = "blur_parity"
required-features = ["cubecl-types"]

[[example]]
name = "colors_parity"
required-features = ["cubecl-types"]

[[example]]
name = "diffmap_inspect"
required-features = ["cubecl-types"]

[[example]]
name = "end_to_end"
required-features = ["cubecl-types"]

[[example]]
