[package]
name = "butteraugli-gpu"
version = "0.0.1"
description = "Multi-vendor GPU implementation of the butteraugli perceptual image quality metric, via CubeCL"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license = "MIT"
rust-version = "1.92"
publish = false

[features]
default = ["cuda", "wgpu", "cpu"]
cuda = ["cubecl/cuda"]
wgpu = ["cubecl/wgpu"]
hip = ["cubecl/hip"]
cpu = ["cubecl/cpu"]

[dependencies]
cubecl = { version = "0.10.0-pre.4", default-features = false, features = ["std"] }

[dev-dependencies]
butteraugli = "0.9.2"
butteraugli-cuda = { path = "../butteraugli-cuda" }
cudarse-driver = { workspace = true }
cudarse-npp = { workspace = true, features = ["isu", "ial", "idei", "if", "ist"] }
bytemuck = "1"
zune-image = { workspace = true }
imgref = "1"
rgb = "0.8"
image = { version = "0.25", default-features = false, features = ["png"] }
