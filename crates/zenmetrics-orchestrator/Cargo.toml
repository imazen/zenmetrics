[package]
name = "zenmetrics-orchestrator"
version = "0.0.1"
description = "Capability-aware scheduler + persistent benchmark cache layered on zenmetrics-api (Phase 1: detection + cache only)"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license = "AGPL-3.0-only OR LicenseRef-Imazen-Commercial"
rust-version.workspace = true
publish = false

# Phase 1 surface is intentionally tiny: capability detection + TOML
# cache. Later phases (benchmark runner, scheduler, worker pool, OOM
# recovery, CPU-backend wiring) extend this crate behind the same
# package, so the public-API shape here MUST stay non-breaking.

[features]
# Default: capability detection + cache only (the Phase 1 surface).
# Phase 2's bench runner pulls in every metric crate via the
# `zenmetrics-api` umbrella — opt in via the `bench` feature when you
# actually want to populate the per-metric profile table.
#
# Phase 6 added per-metric CPU backends behind their own feature flags
# so downstream callers can opt out of unused dependencies. The default
# does NOT include CPU backends because callers who only want capability
# detection shouldn't pay the dep cost. Production sweep workers that
# want the OOM fallback ladder turn on `cpu-all` (or the individual
# `cpu-*` features) explicitly.
default = []

# Phase 2 bench runner. Pulls in zenmetrics-api (umbrella) + cvvdp-gpu
# (direct, for the StripPair backend that the umbrella doesn't surface).
# Default ships the CUDA backend — Phase 6 will widen this to WGPU/HIP.
# Phase 5 layered the worker pool / streaming API on top — pulls xxhash
# for cached-ref auto-detect and rayon for the CPU pool stub.
bench = ["dep:zenmetrics-api", "dep:cvvdp-gpu", "dep:xxhash-rust", "dep:rayon"]

# Phase 4 executor cuda backend. Pulled by `bench` transitively today
# (the umbrella dep already enables `cuda` so the bench runner has a
# CUDA backend to dispatch against). Kept as an explicit feature so
# downstream callers can write `--features cuda` to convey intent and
# so the executor module's `#[cfg(all(feature = "bench", feature =
# "cuda"))]` gate stays meaningful. Implies `bench` because the
# executor depends on the umbrella `MetricKind` / `MemoryMode` types
# that the `bench` feature pulls in. Phase 5 adds `wgpu` / `hip`.
cuda = ["bench"]

# ---------------------------------------------------------------------
# Phase 6 — CPU backend feature flags.
#
# Each `cpu-<metric>` feature wires the corresponding reference CPU
# implementation into the orchestrator's OOM fallback ladder. They're
# additive: turning on `cpu-cvvdp` doesn't require the others. All
# imply `bench` because the CPU adapter shares the `MetricKind` enum
# and the chooser/executor wiring that lives behind the bench feature.
#
# `cpu-all` is the convenience flag for production sweep workers that
# want every supported CPU backend available. Iwssim is intentionally
# absent — no clean CPU reference exists upstream (see
# `docs/CPU_BACKENDS.md`). Iwssim Cpu attempts surface
# `CpuMetricUnavailable` and the OOM ladder advances.
cpu-cvvdp = ["bench", "dep:cvvdp"]
# Phase 8h (2026-05-27): swapped upstream `ssimulacra2` 0.5 for Imazen's
# SIMD-accelerated `fast-ssim2` (per CLAUDE.md crate index). fast-ssim2
# implements its own `ImgRef<[u8; 3]> -> ToLinearRgb` path, so `imgref`
# and `rgb` are no longer mandatory transitive deps for this feature;
# they remain pulled by `cpu-dssim`/`cpu-butter` below.
cpu-ssim2 = ["bench", "dep:fast-ssim2", "dep:imgref", "dep:bytemuck"]
cpu-dssim = ["bench", "dep:dssim-core", "dep:imgref", "dep:rgb", "dep:bytemuck"]
cpu-butter = ["bench", "dep:butteraugli", "dep:imgref", "dep:rgb", "dep:bytemuck"]
cpu-zensim = ["bench", "dep:zensim", "dep:bytemuck"]
# Phase 8g (2026-05-27): added in-tree `iwssim` CPU port (Python-IW-SSIM
# faithful port with magetypes SIMD on the SSIM-stats hot loops). The
# umbrella's `MetricKind::Iwssim` arm no longer surfaces
# `CpuMetricUnavailable` when this feature is on.
cpu-iwssim = ["bench", "dep:iwssim"]
cpu-all = ["cpu-cvvdp", "cpu-ssim2", "cpu-dssim", "cpu-butter", "cpu-zensim", "cpu-iwssim"]

[dependencies]
thiserror = { workspace = true }
serde = { workspace = true }
# Phase 7.6 Layer 4 — observable VRAM budget at instance swap. The
# pool's GPU worker logs debug-level events on every swap and warn-
# level events when the swap surfaces an OOM-at-construction. `log`
# is leaf-only here (no `env_logger`), so it costs nothing in
# production callers that don't enable a logger backend.
log = "0.4.30"

# Phase 2 bench-runner deps. Only pulled when `bench` is enabled — this
# keeps the Phase 1 surface (capability detection + TOML cache) free of
# the cubecl + per-metric build graph.
zenmetrics-api = { workspace = true, optional = true, default-features = false, features = ["all-metrics", "cuda"] }
cvvdp-gpu = { workspace = true, optional = true, default-features = false, features = ["cuda"] }

# Phase 5: cached-reference auto-detect hashes ref bytes via xxhash3
# (fast enough for 4096² at <10ms). Already in the workspace lockfile
# transitively, pinned here so the cached-ref code can't regress to
# an older line.
xxhash-rust = { version = "0.8.15", features = ["xxh3"], optional = true }

# Phase 5: rayon-managed CPU pool. Only pulled when `bench` is on
# (Phase 6 will use this to actually run CPU references). Already in
# the workspace lockfile.
rayon = { version = "1.12.0", optional = true }

# Phase 6: per-metric CPU reference crates. Each is optional and pulled
# only when its `cpu-<metric>` feature is on. Versions track the workspace
# pins (which themselves match the dev-deps that the corresponding
# `-gpu` crates already use for parity tests).
cvvdp = { workspace = true, optional = true }
# Phase 8h (2026-05-27): replaced upstream `ssimulacra2` 0.5 with
# Imazen's SIMD-accelerated `fast-ssim2`. fast-ssim2 0.8 is on crates.io
# and pulled at version-level (no workspace pin yet — only this crate
# depends on it directly). The `imgref` feature wires up the
# `ImgRef<[u8; 3]> -> LinearRgbImage` adapter so we don't have to
# manually transcode sRGB-u8 bytes ourselves like the prior `ssimulacra2`
# path did. See `docs/CPU_BACKENDS.md` for the rationale.
fast-ssim2 = { version = "0.8.0", optional = true, features = ["imgref"] }
dssim-core = { workspace = true, optional = true }
butteraugli = { workspace = true, optional = true }
zensim = { workspace = true, optional = true }
# Phase 8g: in-tree CPU IW-SSIM port.
iwssim = { workspace = true, optional = true }

# Shared support crates pulled in only when one of `cpu-ssim2`,
# `cpu-dssim`, `cpu-butter` is on. `imgref` provides `ImgVec`/`ImgRef`
# for dssim+butter; `rgb` provides `RGB<u8>` / `Rgb` color pixel types.
imgref = { workspace = true, optional = true }
rgb = { workspace = true, optional = true }
# Phase 9.Y (2026-05-27): zero-copy reinterpretation of interleaved sRGB-u8
# byte buffers as `&[[u8; 3]]` / `&[RGB<u8>]` for cpu-* adapter inputs.
# Replaces the prior `chunks_exact(3).collect::<Vec<_>>()` materialization
# that allocated 120 MB / side at 40 MP across four adapters.
bytemuck = { workspace = true, optional = true }

# Hashing the machine fingerprint. Workspace already pins sha2 0.10 via
# transitive deps; we depend on it directly for `Sha256`.
sha2 = "0.10.9"

# TOML serialization for the persistent capability profile. The newer
# `toml = "1"` line is already in the workspace lockfile.
toml = "1.1.2"

# CPU fingerprint — brand string + SIMD feature bits via CPUID.
raw-cpuid = "11.6.0"

# System total RAM (sysinfo is already in the lockfile transitively;
# we pin the version explicitly here so the public profile matches).
sysinfo = { version = "0.38.4", default-features = false, features = ["system"] }

# XDG cache dir resolution. `dirs = "6"` is already in the lockfile.
dirs = "6.0.0"

[dev-dependencies]
tempfile = "3"

[[example]]
name = "print_capability"
path = "examples/print_capability.rs"

# Phase 2 single-cell bench worker. The orchestrator's bench runner
# spawns this as a subprocess per cell when subprocess mode is enabled.
# Only builds when the `bench` feature is on so default builds don't
# pull in the full per-metric graph for the example.
[[example]]
name = "bench_worker"
path = "examples/bench_worker.rs"
required-features = ["bench"]

# Phase 3 chooser integration tests. Requires `bench` because the
# test suite imports `MetricKind` from zenmetrics-api (the bench
# feature pulls that crate in). The chooser module itself is gated
# on `bench` for the same reason.
[[test]]
name = "chooser"
path = "tests/chooser.rs"
required-features = ["bench"]

# Phase 4 executor integration tests. Requires `cuda` (which implies
# `bench`) because the executor module is gated on both. The real-GPU
# tests inside the file are individually `#[ignore]`d; the rest of the
# suite exercises chooser + cache-persistence paths without touching
# the device. **Build note (2026-05-27):** in a jj sibling workspace
# (`zenmetrics--*`) cargo discovers TWO `butteraugli-gpu` packages via
# jxl-encoder's hardcoded `../zenmetrics/crates/butteraugli-gpu` path,
# producing a lockfile collision. Build/run these tests from the
# primary `zenmetrics/` checkout instead — that's also how the Phase 3
# `chooser` tests are run.
[[test]]
name = "executor"
path = "tests/executor.rs"
required-features = ["cuda"]

# Phase 4 single-task executor example. Drives `Orchestrator::run_single`
# end-to-end against a real CUDA device — useful for manual smoke tests
# and the brief's "produce a sensible Score" acceptance gate. Same
# sibling-workspace caveat as the `executor` test above.
[[example]]
name = "run_single"
path = "examples/run_single.rs"
required-features = ["cuda"]

# Phase 5 streaming integration tests. Same sibling-workspace caveat —
# build from the primary `zenmetrics/` checkout.
[[test]]
name = "streaming"
path = "tests/streaming.rs"
required-features = ["cuda"]

# Phase 5 cached-ref auto-detect tests. Sibling-workspace caveat applies.
[[test]]
name = "cached_ref"
path = "tests/cached_ref.rs"
required-features = ["cuda"]

# Phase 6 CPU backend integration tests. Each per-metric test is gated
# on its `cpu-<metric>` feature; `cuda` is required for the executor
# module gate. Same sibling-workspace caveat as the other Phase 4-5
# tests — build from the primary `zenmetrics/` checkout to avoid the
# butteraugli-gpu lockfile collision documented above.
[[test]]
name = "cpu_backend"
path = "tests/cpu_backend.rs"
required-features = ["cuda"]

# Phase 7.6 reordering tests — warm-instance churn + cached-ref hit
# rate + streaming reorder window. Most tests inspect submit/flush
# plumbing without driving compute (so they run without --ignored);
# the GPU-only warm-churn + cached-ref + peak-VRAM tests are
# individually marked `#[ignore]` because they require a real CUDA
# device. Sibling-workspace caveat applies.
[[test]]
name = "reorder"
path = "tests/reorder.rs"
required-features = ["cuda"]

# Phase 8a graceful no-GPU fallback integration tests. Covers the
# ZENMETRICS_FORCE_NO_GPU=1 env-var fixture, bench-plan gating, the
# chooser's NoGpuPresent rejection, and the executor's libcuda-missing
# downgrade path. Same sibling-workspace caveat — build from the
# primary `zenmetrics/` checkout.
[[test]]
name = "no_gpu_fallback"
path = "tests/no_gpu_fallback.rs"
required-features = ["cuda"]

# Phase 9 GPU concurrency invariants — parity (N=1 vs N=4 bit-identical
# scores) + throughput (N=4 >= 2.5x N=1 at 4096²) + adaptive lane count
# introspection. Every test is `#[ignore]`d because they require real
# CUDA + populated capability cache + (for the adaptive test) working
# nvidia-smi. Sibling-workspace caveat applies.
[[test]]
name = "gpu_concurrency"
path = "tests/gpu_concurrency.rs"
required-features = ["cuda"]

# Phase 5 batch example. Drives `Orchestrator::run_all` against a real
# CUDA device. Sibling-workspace caveat applies.
[[example]]
name = "run_batch"
path = "examples/run_batch.rs"
required-features = ["cuda"]

# Phase 5 streaming example. Drives `Orchestrator::submit` + `poll`.
# Sibling-workspace caveat applies.
[[example]]
name = "run_stream"
path = "examples/run_stream.rs"
required-features = ["cuda"]
