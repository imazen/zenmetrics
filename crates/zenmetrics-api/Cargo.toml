[package]
name = "zenmetrics-api"
version = "0.0.1"
description = "Umbrella crate composing the six zen GPU image-quality metrics behind one enum-dispatched opaque API"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license = "AGPL-3.0-only OR LicenseRef-Imazen-Commercial"
rust-version.workspace = true
publish = false

[features]
# Default: every metric, CUDA backend, zenpixels integration. The opaque
# surface stays cubecl-version-agnostic (no cubecl types leak through
# the API). Add the `cubecl-types` feature to opt into the typed surface
# of every enabled metric crate.
default = ["all-metrics", "cuda", "pixels", "encoded"]
## HDR front-end: transfer functions + display model + PU21 perceptually-uniform
## encoding (`hdr` module), so the SDR metrics can score HDR pairs. Pure math,
## no GPU/codec deps. Off by default.
hdr = []

# Per-metric switches — let downstream consumers compile out the
# metrics they don't need. `all-metrics` is the umbrella.
all-metrics = ["cvvdp", "butter", "ssim2", "dssim", "iwssim", "zensim"]
# Each GPU metric pulls the shared `zenmetrics-gpu-core` (Backend/Score live
# there) — so a CPU-only build (`cpu-metrics`, no GPU metric) never links it
# (or its cubecl dep).
cvvdp  = ["dep:cvvdp-gpu", "dep:zenmetrics-gpu-core"]
# `butteraugli-gpu/internals` exposes the opaque's faithful HDR
# linear-planes path (`ButteraugliOpaque::compute_from_linear_planes`),
# which `Metric::compute_from_linear_planes` dispatches to. It's an
# empty visibility-gate feature (no extra deps), so enabling it
# unconditionally with `butter` is free.
butter = ["dep:butteraugli-gpu", "dep:zenmetrics-gpu-core", "butteraugli-gpu/internals"]
ssim2  = ["dep:ssim2-gpu", "dep:zenmetrics-gpu-core"]
dssim  = ["dep:dssim-gpu", "dep:zenmetrics-gpu-core"]
iwssim = ["dep:iwssim-gpu", "dep:zenmetrics-gpu-core"]
zensim = ["dep:zensim-gpu", "dep:zenmetrics-gpu-core"]

# Backend selection — forwards through to every enabled metric crate.
# Default ships `cuda` only; pass `--no-default-features --features
# all-metrics,wgpu,pixels` to swap.
cuda = [
    "cvvdp-gpu?/cuda",
    "butteraugli-gpu?/cuda",
    "ssim2-gpu?/cuda",
    "dssim-gpu?/cuda",
    "iwssim-gpu?/cuda",
    "zensim-gpu?/cuda",
    "zenmetrics-gpu-core?/cuda",
]
wgpu = [
    "cvvdp-gpu?/wgpu",
    "butteraugli-gpu?/wgpu",
    "ssim2-gpu?/wgpu",
    "dssim-gpu?/wgpu",
    "iwssim-gpu?/wgpu",
    "zensim-gpu?/wgpu",
    "zenmetrics-gpu-core?/wgpu",
]
hip = [
    "cvvdp-gpu?/hip",
    "butteraugli-gpu?/hip",
    "ssim2-gpu?/hip",
    "dssim-gpu?/hip",
    "iwssim-gpu?/hip",
    "zensim-gpu?/hip",
    "zenmetrics-gpu-core?/hip",
]
cpu = [
    "cvvdp-gpu?/cpu",
    "butteraugli-gpu?/cpu",
    "ssim2-gpu?/cpu",
    "dssim-gpu?/cpu",
    "iwssim-gpu?/cpu",
    "zensim-gpu?/cpu",
    "zenmetrics-gpu-core?/cpu",
]

# --- Optimized native-CPU metrics backing `Backend::Cpu` (task #159 phase 2) ---
# DISTINCT from the `cpu` feature above, which forwards the *cubecl-cpu*
# backend (`Backend::CubeclCpu`) into the `-gpu` crates. These `cpu-*`
# features pull the OPTIMIZED native crates that back `Backend::Cpu`,
# mirroring zenmetrics-orchestrator's `cpu_adapter`. Wired per-metric (one
# per chunk); a metric without its `cpu-*` feature returns
# `Error::BackendNotEnabled` for `Backend::Cpu`.
cpu-ssim2 = ["dep:fast-ssim2", "dep:imgref", "dep:bytemuck"]
# `cvvdp`/`iwssim` are workspace deps with `default-features = false`, and
# both are no_std+alloc crates with an explicit `std` feature. The umbrella
# uses `std` (process probes, format!, Vec) so the optimized-CPU path needs
# it. Enabling it here is additive — the default build already gets it via
# the GPU crates' feature unification — but it makes the standalone
# `--no-default-features --features cpu-metrics` build (CI cpu job, phase 5)
# self-sufficient instead of accidentally relying on a GPU crate being on.
cpu-cvvdp = ["dep:cvvdp", "cvvdp/std"]
cpu-dssim = ["dep:dssim-core", "dep:imgref", "dep:rgb", "dep:bytemuck"]
cpu-butter = ["dep:butteraugli", "dep:imgref", "dep:rgb", "dep:bytemuck"]
cpu-zensim = ["dep:zensim", "dep:bytemuck"]
cpu-iwssim = ["dep:iwssim", "iwssim/std"]
# Umbrella: every optimized native-CPU metric (parallels `all-metrics`).
cpu-metrics = ["cpu-cvvdp", "cpu-ssim2", "cpu-dssim", "cpu-butter", "cpu-zensim", "cpu-iwssim"]

# Encoded-file front door (`score_encoded`): decode PNG/JPEG `&[u8]` to RGB8
# internally (task #159 phase 4c). Default-on so the front door is always
# present; depend with `--no-default-features` to drop the `image` decoder.
encoded = ["dep:image"]

# zenpixels integration on the umbrella API. Forwards `pixels` to every
# enabled metric crate so `Metric::compute_pixels` works.
pixels = [
    # Descriptor-driven scoring needs the HDR feeding (a PixelSlice descriptor
    # may be HDR), so `Metric::compute_pixels` auto-handles HDR whenever it can
    # take PixelSlices — no separate opt-in. The `hdr` module is pure math (no
    # deps), so this is free.
    "hdr",
    "dep:zenpixels",
    "dep:zenpixels-convert",
    "zenmetrics-gpu-core?/pixels",
    "cvvdp-gpu?/pixels",
    "butteraugli-gpu?/pixels",
    "ssim2-gpu?/pixels",
    "dssim-gpu?/pixels",
    "iwssim-gpu?/pixels",
    "zensim-gpu?/pixels",
]

# Opt into the typed cubecl surface of every enabled metric crate +
# expose the umbrella `MetricContext<R>` upload-sharing scaffold.
# Requires all enabled metric crates to resolve to the same cubecl
# version (see build.rs check).
cubecl-types = [
    "dep:cubecl",
    "cvvdp-gpu?/cubecl-types",
    "butteraugli-gpu?/cubecl-types",
    "ssim2-gpu?/cubecl-types",
    "dssim-gpu?/cubecl-types",
    "iwssim-gpu?/cubecl-types",
    "zensim-gpu?/cubecl-types",
]

[dependencies]
butteraugli-gpu = { workspace = true, optional = true }
cvvdp-gpu       = { workspace = true, optional = true }
dssim-gpu       = { workspace = true, optional = true }
iwssim-gpu      = { workspace = true, optional = true }
ssim2-gpu       = { workspace = true, optional = true }
zensim-gpu      = { workspace = true, optional = true }
# Shared Backend/Score types — pulled by any GPU metric feature (so the
# umbrella's one `gpu_backend` adapter can name the unified `Backend`). Not
# linked by CPU-only builds.
zenmetrics-gpu-core = { path = "../zenmetrics-gpu-core", default-features = false, optional = true }

# Optimized native-CPU metric crates backing `Backend::Cpu` (task #159
# phase 2). Pulled only by the `cpu-*` features above; pins match the ones
# zenmetrics-orchestrator's cpu_adapter uses (workspace consistency).
fast-ssim2  = { version = "0.8.1", optional = true, features = ["imgref"] }
cvvdp       = { workspace = true, optional = true }
dssim-core  = { workspace = true, optional = true }
butteraugli = { workspace = true, optional = true }
zensim      = { workspace = true, optional = true }
iwssim      = { workspace = true, optional = true }
imgref      = { workspace = true, optional = true }
rgb         = { workspace = true, optional = true }
bytemuck    = { workspace = true, optional = true }

# Re-exported pixel slice for the umbrella `compute_pixels` path.
zenpixels = { version = "0.2.11", default-features = false, features = ["std"], optional = true }
# PixelSlice -> sRGB8 conversion for the optimized-CPU `compute_pixels` path
# (task #159 phase 3); the GPU arms convert inside each `-gpu` crate.
zenpixels-convert = { version = "0.2.11", default-features = false, features = ["std"], optional = true }
# Decoder for the `score_encoded` front door (task #159 phase 4c).
image = { workspace = true, optional = true }

# Typed-surface escape hatch (only pulled in when `cubecl-types` is on).
cubecl = { workspace = true, optional = true }

thiserror = { workspace = true }

[dev-dependencies]
# Smoke tests construct a PixelBuffer for the `compute_pixels` path.
zenpixels = { version = "0.2.11", default-features = false, features = ["std"] }
# Phase 4 compute_handles test needs the cubecl runtime to build a
# shared client. Only used by `tests/compute_handles.rs`, which is
# gated on `cuda,cubecl-types`.
cubecl = { workspace = true }

[[example]]
name = "inprocess_warmth"
required-features = ["cubecl-types"]

[[example]]
name = "setref_all_timing"
required-features = ["cubecl-types"]

# mode_wall (task #157 Phase A): Full-vs-Strip(-vs-StripPair) wall-time +
# peak-VRAM sweep across all six metrics, both contexts, four sizes. Gated
# on cubecl-types because the worker syncs the cubecl client inside the
# timed region (and reaches the typed cvvdp StripPair API).
[[example]]
name = "mode_wall"
required-features = ["cubecl-types", "cvvdp"]

# Unified descriptor-driven entry: sRGB8 slice == native; HDR linear == nits path.

[[test]]
name = "it"
path = "tests/it/main.rs"
