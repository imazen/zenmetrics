[package]
name = "zenstats"
description = "Paper-correct IQA statistical panel: Mohammadi 2025 (SROCC + PLCC + KROCC + OR + PWRC + Z-RMSE), MRR significance, bootstrap CI delta, and decisive A-vs-B comparison."
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license = "MIT OR Apache-2.0"
readme = "README.md"
keywords = ["iqa", "stats", "image-quality", "spearman", "pearson"]
categories = ["multimedia::images", "science", "mathematics"]

[features]
default = ["parallel"]
# Enable rayon parallelism in `bootstrap_ci_delta`. Strip for no_std-ish
# embedding (the rest of the crate is pure-CPU `core + alloc`).
parallel = ["dep:rayon"]

[dependencies]
rayon = { version = "1", optional = true }

[dev-dependencies]
# Self-contained — no parquet/arrow at unit-test time. Integration
# tests against fixture data live in zensim-validate (panel_parity).
