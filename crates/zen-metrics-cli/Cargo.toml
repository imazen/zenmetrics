[package]
name = "zen-metrics-cli"
version = "0.1.0"
description = "Unified CLI for decoding zen image formats and scoring perceptual quality metrics on CPU and GPU"
authors = ["Lilith River <support@imazen.io>"]
homepage.workspace = true
repository.workspace = true
edition.workspace = true
license = "AGPL-3.0-or-later"
rust-version = "1.92"
publish = false

[[bin]]
name = "zen-metrics"
path = "src/main.rs"

[features]
# Defaults are CPU-only with the zen decoders available on crates.io that
# build cleanly against the latest archmage / magetypes. JPEG is omitted
# from the default set because zenjpeg 0.8.3 does not yet build against
# magetypes 0.9.x — see the `jpeg` feature note below.
default = ["png", "webp", "avif", "jxl", "cpu-metrics"]

# Decoder feature flags
png = ["dep:zenpng"]
# Optional: enables the `zenjpeg` decoder. The published 0.8.3 version
# fails to compile against magetypes >= 0.9 (see the issue tracker).
# Until a fixed release lands the CLI does not include JPEG support; once
# it does, opt in with `--features jpeg`.
jpeg = ["dep:zenjpeg"]
webp = ["dep:zenwebp"]
avif = ["dep:zenavif"]
jxl = ["dep:zenjxl"]

# CPU metric feature flags
cpu-metrics = [
    "dep:butteraugli",
    "dep:dssim-core",
    "dep:zensim",
    "dep:ssimulacra2",
    "dep:rgb",
    "dep:imgref",
]

# GPU bundle: pulls both GPU metric implementations.
gpu = ["gpu-butteraugli", "gpu-ssim2"]
gpu-butteraugli = ["dep:butteraugli-gpu", "dep:cubecl"]
gpu-ssim2 = ["dep:ssim2-gpu", "dep:cubecl"]
# Pick CubeCL backends. Default forwards through the GPU metric crates which
# already enable cuda/wgpu/cpu when their default features are kept.
gpu-cuda = ["butteraugli-gpu?/cuda", "ssim2-gpu?/cuda", "cubecl?/cuda"]
gpu-wgpu = ["butteraugli-gpu?/wgpu", "ssim2-gpu?/wgpu", "cubecl?/wgpu"]
gpu-hip = ["butteraugli-gpu?/hip", "ssim2-gpu?/hip", "cubecl?/hip"]
gpu-cpu = ["butteraugli-gpu?/cpu", "ssim2-gpu?/cpu", "cubecl?/cpu"]

[dependencies]
clap = { workspace = true }
serde = { workspace = true, features = ["derive"] }
# `preserve_order` keeps the JSON `compare` output in the order we insert
# keys (reference → variant → scores), matching the documented schema.
serde_json = { workspace = true, features = ["preserve_order"] }
csv = { workspace = true }

# zen image decoders
zenpng = { version = "0.1.4", optional = true }
zenjpeg = { version = "0.8.3", optional = true }
zenwebp = { version = "0.4.5", optional = true }
zenavif = { version = "0.1.7", optional = true }
zenjxl = { version = "0.2.1", optional = true }

# zenpixels exposes the PixelBuffer / PixelSlice types returned by zen
# decoders. We pin to a version compatible with the decoders above.
zenpixels = "0.2.11"
# enough provides the cooperative cancellation token zenpng's decode wants.
enough = "0.4.4"

# CPU metrics
butteraugli = { version = "0.9.2", optional = true }
dssim-core = { version = "3.4.0", optional = true }
zensim = { version = "0.2.7", optional = true }
ssimulacra2 = { version = "0.5.1", optional = true }
rgb = { version = "0.8", optional = true }
imgref = { version = "1", optional = true }

# GPU metric backends (path deps in this workspace)
butteraugli-gpu = { path = "../butteraugli-gpu", optional = true, default-features = false }
ssim2-gpu = { path = "../ssim2-gpu", optional = true, default-features = false }

# CubeCL is required to construct GPU clients when any GPU backend is enabled.
# Optional — pulled in by the gpu-* feature flags.
cubecl = { version = "0.10.0-pre.4", default-features = false, features = ["std"], optional = true }

[dev-dependencies]
tempfile = "3"
serde_json = { workspace = true }
