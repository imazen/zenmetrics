[package]
name = "zensim-gpu"
version = "0.0.1"
description = "Multi-vendor GPU implementation of the zensim perceptual similarity feature extractor, via CubeCL"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license = "AGPL-3.0-only OR LicenseRef-Imazen-Commercial"
rust-version.workspace = true
publish = false

[features]
default = ["cuda", "wgpu", "cpu", "fast-reduction", "pixels", "acumen"]
cuda = ["cubecl/cuda"]
wgpu = ["cubecl/wgpu"]
hip  = ["cubecl/hip"]
cpu  = ["cubecl/cpu"]
# Opaque-API zenpixels integration — see dssim-gpu/Cargo.toml.
pixels = ["dep:zenpixels", "dep:zenpixels-convert"]
# Exposes the generic typed Zensim<R>. Off by default.
cubecl-types = []
# Use Atomic<u32>::fetch_max + per-block partials for the per-column
# accumulators. Same backend reality as dssim-gpu / ssim2-gpu: works on
# CUDA / DX12 / HIP; Metal silently no-ops Atomic<f32>::fetch_add. The
# `fast-reduction` flag here only gates the f32 atomic-add fast path
# for the per-feature scalar fold; the f64 sum precision is preserved
# by host-side promotion on read-back.
fast-reduction = []
# castleCSF acumen Mode A / Mode B / Mode B-per-band support.
# Pulls in zensim's `acumen` feature for the LUT loader. Without
# this feature the AcumenArch enum still exists (as `non_exhaustive`)
# but all variants except `HfPost` panic if selected at runtime,
# and ZensimParams::with_acumen_mode_a / with_acumen_arch produce
# no-ops. ~132 KB castleCSF LUT + ~600 lines of host-side
# preprocessing land only with this feature on.
acumen = ["zensim/acumen"]

[dependencies]
cubecl = { workspace = true }
zenpixels = { version = "0.2.11", default-features = false, features = ["std"], optional = true }
zenpixels-convert = { version = "0.2.11", default-features = false, features = ["std"], optional = true }
# `zensim` provides the `acumen` module (castleCSF LUT loader,
# ViewingCondition, per-band weights). Pulled in at runtime so
# `acumen_mode_a` can compute per-image weights inside
# `Zensim::set_reference`. Default-features off keeps compile time
# bounded — we only touch the small no-std-friendly subset.
zensim = { workspace = true }

[dev-dependencies]
bytemuck = { workspace = true }
image = { workspace = true, features = ["png", "jpeg"] }
zenmetrics-corpus = { workspace = true }
zenpixels = { version = "0.2.11", default-features = false, features = ["std"] }
# Direct dep for extract_acumen_features example — uses
# `zensim::acumen::mode_b::apply_mode_b_premultiply`. The crate's
# runtime deps already include zensim for the `acumen` types, but
# examples need explicit dev-dep entries.
zensim = { workspace = true }
# For extract_acumen_features example — parquet output of 228 features
arrow-array = "58.3"
arrow-schema = "58.3"
parquet = { version = "58.3", features = ["arrow"] }

[[example]]
name = "bench"
required-features = ["cubecl-types"]

[[example]]
name = "debug_features"
required-features = ["cubecl-types"]

[[example]]
name = "end_to_end"
required-features = ["cubecl-types"]

[[example]]
name = "zensim_bench_t4_warm"
required-features = ["cubecl-types"]

[[test]]
name = "cpu_parity"
required-features = ["cubecl-types"]

[[test]]
name = "parity_lock"
required-features = ["cubecl-types"]

[[test]]
name = "opaque"
required-features = ["cubecl-types"]
