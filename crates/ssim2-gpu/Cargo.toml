required-features = ["cubecl-types"]

[[example]]
name = "blur_parity"
required-features = ["cubecl-types"]

[[example]]
name = "cached_reference"
required-features = ["cubecl-types"]

[[example]]
name = "end_to_end"
required-features = ["cubecl-types"]

[[example]]
name = "parity_jpeg_corpus"
required-features = ["cubecl-types"]

[[example]]
name = "parity_real_image"
required-features = ["cubecl-types"]

[[example]]
name = "srgb_parity"
required-features = ["cubecl-types"]

[[example]]
name = "ssim2_bench_warm"
required-features = ["cubecl-types"]

[[example]]
