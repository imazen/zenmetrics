[package]
name = "ssim2-gpu"
version = "0.0.1"
description = "Multi-vendor GPU implementation of the SSIMULACRA2 perceptual image quality metric, via CubeCL"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license = "MIT"
rust-version = "1.92"
publish = false

[features]
default = ["cuda", "wgpu", "cpu", "fast-reduction"]
cuda = ["cubecl/cuda"]
wgpu = ["cubecl/wgpu"]
hip = ["cubecl/hip"]
cpu = ["cubecl/cpu"]
# Use Atomic<f32>::fetch_add for the per-octave reduction. On CUDA
# this drops single-image latency from ~5 ms to ~1 ms and the batched
# per-image cost from ~1.3 ms to ~0.5 ms at 256². It does NOT work on
# cubecl-wgpu's Metal backend — the runtime reports
# `Atomic<f32> = LoadStore|Add` as supported, but the codegen silently
# no-ops at execution time and the reductions return zero, collapsing
# every score to ~100. Disable when targeting wgpu / Metal:
#   cargo build -p ssim2-gpu --no-default-features --features wgpu
fast-reduction = []

[dependencies]
cubecl = { version = "0.10.0-pre.4", default-features = false, features = ["std"] }

[build-dependencies]
nalgebra = { workspace = true }

[dev-dependencies]
ssimulacra2 = "0.5.1"
yuvxyb = "0.5.0"
bytemuck = "1"
imgref = "1"
rgb = "0.8"
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
