[package]
name = "ssim2-gpu"
version = "0.0.1"
description = "Multi-vendor GPU implementation of the SSIMULACRA2 perceptual image quality metric, via CubeCL"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license = "MIT"
rust-version = "1.92"
publish = false

[features]
default = ["cuda", "wgpu", "cpu"]
cuda = ["cubecl/cuda"]
wgpu = ["cubecl/wgpu"]
hip = ["cubecl/hip"]
cpu = ["cubecl/cpu"]

[dependencies]
cubecl = { version = "0.10.0-pre.4", default-features = false, features = ["std"] }

[build-dependencies]
nalgebra = { workspace = true }

[dev-dependencies]
ssimulacra2 = "0.5.1"
yuvxyb = "0.5.0"
bytemuck = "1"
imgref = "1"
rgb = "0.8"
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
