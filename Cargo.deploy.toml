# Minimal workspace for building the deployable job-system crates (Railway dashboard + fleet worker)
# in isolation. The full workspace can't build standalone: zenmetrics-cli path-deps the jxl-encoder
# sibling repo (outside this repo), absent from a deploy/cross/remote build context. These crates
# reach outside the repo for nothing. Builders cp this over Cargo.toml before `cargo build -p <crate>`:
#   - Railway: cargo build -p zenfleet-dash   (the dashboard)
#   - fleet boxes (arm-zen/Oracle/etc.): cargo build -p zenfleet-worker  (worker + jobexec bins)
[workspace]
members = [
    "crates/zenfleet-core",
    "crates/zenfleet-ledger",
    "crates/zenfleet-dash",
    "crates/zenfleet-worker",
    "crates/zenfleet-ctl",
]
resolver = "2"

[workspace.package]
authors = ["Imazen <support@imazen.io>"]
homepage = "https://github.com/imazen/zenmetrics"
repository = "https://github.com/imazen/zenmetrics"
edition = "2024"
rust-version = "1.93"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
clap = { version = "4", default-features = false, features = ["color", "derive", "error-context", "help", "std", "usage", "wrap_help"] }
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
