# Minimal workspace for building the zen-jobdash control plane in Docker / Railway.
# The full workspace can't build in isolation: zen-metrics-cli has a path dependency on the
# jxl-encoder sibling repo (outside this repo), which isn't in the deploy build context. The
# dashboard only needs these three crates, none of which reach outside the repo.
# The Dockerfile copies this over Cargo.toml before `cargo build -p zen-jobdash`.
[workspace]
members = [
    "crates/zen-job-core",
    "crates/zen-ledger",
    "crates/zen-jobdash",
]
resolver = "2"

[workspace.package]
authors = ["Imazen <support@imazen.io>"]
homepage = "https://github.com/imazen/zenmetrics"
repository = "https://github.com/imazen/zenmetrics"
edition = "2024"
rust-version = "1.93"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
