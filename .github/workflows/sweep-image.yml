name: Sweep image (Dockerfile.sweep.v26)

# Builds the production ready-to-run vast.ai sweep image on every push
# to master + every tag. Single-file image (v26) replaces the v14→v25
# chain: stable base (ubuntu + python-pyarrow + cuda-nvrtc + cuda-dev
# headers + s5cmd + jq + cuda_dlsym_stub) is rebuilt only when those
# RUN steps change; the per-push delta is the zen-metrics binary
# (~280 MB) + zen-sweep-worker + vastai-fleet binaries (~10 MB) + scripts (~50 KB).
#
# Tag scheme:
#   ghcr.io/imazen/zen-metrics-sweep:v26-<short-sha>      (every push)
#   ghcr.io/imazen/zen-metrics-sweep:v26                  (latest master)
#   ghcr.io/imazen/zen-metrics-sweep:v26-<release-tag>    (tagged releases)
#
# Why this exists: vast.ai workers used to run a 5-15 min apt-install
# script on every boot (python3-pyarrow + cuda-nvrtc + libcuda support
# libs). With this workflow + v26 layering, boot-to-first-claim is ~5 s.
# That's the difference between burning $0.10/hr × 30 boxes × 15 min on
# apt = $0.75 per launch, vs essentially free per launch. Compounding
# over months of fleet relaunches that adds up.

on:
  push:
    branches: [master, main]
    tags:
      - "zen-metrics-cli-v*"
    paths:
      # Rebuild when any of these change. Cargo source, the Dockerfile
      # itself, the cuda_dlsym_stub source, or the worker scripts.
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile.sweep.v26"
      - "scripts/sweep/cuda_dlsym_stub.c"
      - "scripts/sweep/onstart_*.sh"
      - "scripts/sweep/*chunk_worker.sh"
      - "scripts/sweep/run_with_error_trap.sh"
      - ".github/workflows/sweep-image.yml"
  workflow_dispatch:
    inputs:
      force_rebuild_base:
        description: "Rebuild the base layer (no cache hit even if Dockerfile base stage unchanged)"
        type: boolean
        default: false

env:
  IMAGE_NAME: ghcr.io/imazen/zen-metrics-sweep
  REGISTRY: ghcr.io

jobs:
  build-binary:
    name: Build zen-metrics + zen-sweep-worker + vastai-fleet binaries (Linux x86_64)
    runs-on: ubuntu-latest
    outputs:
      sha-short: ${{ steps.meta.outputs.sha-short }}
    steps:
      - uses: actions/checkout@v4

      # zenmetrics workspace has [patch.crates-io] entries pointing at
      # sibling worktrees. Clone them at pinned commits so the cargo
      # build inside CI resolves the same versions a local build does.
      # The pins live in zenmetrics/CLAUDE.md + the [patch] block.
      - name: Clone sibling repos (zenjpeg + zenpng + zenwebp + zenavif--main + zenjxl--main + zenanalyze + zensim--principled-activity + jxl-encoder)
        run: |
          git clone --quiet https://github.com/imazen/zenjpeg.git    ../zenjpeg
          git -C ../zenjpeg checkout 582bf0efe3d2804617a5b007567463fcc9d1b433
          git clone --quiet https://github.com/imazen/zenanalyze.git ../zenanalyze
          git -C ../zenanalyze checkout 8cae13b962fc1edbef0dc02e7c0cb6775351638f
          # zensim principled-activity branch — required by the
          # [patch.crates-io] zensim = { path = ... } line.
          git clone --quiet --branch feat/principled-activity \
              https://github.com/imazen/zensim.git ../zensim--principled-activity
          # jxl-encoder — direct path dep from zen-metrics-cli (Cargo.toml:176)
          git clone --quiet https://github.com/imazen/jxl-encoder.git ../jxl-encoder
          git -C ../jxl-encoder checkout 42833a05ac58fd1b3ce6ff27095bc2160378c72d
          # Codec siblings — workspace [patch.crates-io] entries point at
          # these worktree directories. Clone tip-of-master; pin if CI
          # bisection ever turns up a regression.
          git clone --quiet https://github.com/imazen/zenpng.git     ../zenpng
          git clone --quiet https://github.com/imazen/zenwebp.git    ../zenwebp
          # zenavif `main` branch is checked out in a worktree dir named
          # `zenavif--main` locally; CI just needs a regular clone at
          # that name. Same story for zenjxl.
          git clone --quiet https://github.com/imazen/zenavif.git    ../zenavif--main
          git clone --quiet https://github.com/imazen/zenjxl.git     ../zenjxl--main

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: zen-metrics-sweep-image
          workspaces: . -> target

      # CUDARC_CUDA_VERSION=12000 pins cudarc 0.19.4's eager Lib::new
      # loader to the CUDA 12.0 binding surface. See v19/v20/v21 git
      # history for the panic chain (cuCtxGetDevice_v2, cuEventElapsedTime_v2,
      # cuCoredump* family) this avoids on driver 525+ vast.ai hosts.
      - name: Build zen-metrics (release, sweep + GPU features, cudarc-12000-pinned)
        env:
          CARGO_PROFILE_RELEASE_LTO: thin
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
          CARGO_PROFILE_RELEASE_DEBUG: "false"
          CUDARC_CUDA_VERSION: "12000"
        run: |
          cargo build --release -p zen-metrics-cli \
              --no-default-features \
              --features 'sweep,png,gpu,gpu-cuda,gpu-cpu'
          mkdir -p artifacts
          cp target/release/zen-metrics artifacts/zen-metrics
          chmod +x artifacts/zen-metrics
          ./artifacts/zen-metrics --version
          ./artifacts/zen-metrics list-metrics | grep -q iwssim
          ./artifacts/zen-metrics list-metrics | grep -q cvvdp
          ./artifacts/zen-metrics list-metrics | grep -q zensim
          ./artifacts/zen-metrics score-pairs --help | grep -q allow-small-images
          ./artifacts/zen-metrics sweep --help | grep -q zenjpeg

      # zen-sweep-worker is the cloud-agnostic DEPLOYED worker
      # (`worker --backend vastai --mode {omni,feature-backfill,
      # source-features}`). --features vastai pulls zen-cloud-vastai's
      # inline-sweep + source-features in-process run_sweep tree.
      - name: Build zen-sweep-worker (release, vastai)
        run: |
          cargo build --release -p zen-sweep-worker --features vastai
          cp target/release/zen-sweep-worker artifacts/zen-sweep-worker
          chmod +x artifacts/zen-sweep-worker
          ./artifacts/zen-sweep-worker --version
          ./artifacts/zen-sweep-worker --help | grep -q -- '--backend'
          ./artifacts/zen-sweep-worker worker --help | grep -q -- '--mode'
          ./artifacts/zen-sweep-worker worker --help | grep -q -- '--run-id'

      # vastai-fleet stays the operator + error-trap CLI (self-destroy /
      # status / destroy / watch). Built from the renamed crate
      # zen-cloud-vastai. --features inline-sweep keeps the worker
      # subcommand available for ad-hoc operator use.
      - name: Build vastai-fleet operator CLI (release, inline-sweep)
        run: |
          cargo build --release -p zen-cloud-vastai --features inline-sweep
          cp target/release/vastai-fleet artifacts/vastai-fleet
          chmod +x artifacts/vastai-fleet
          ./artifacts/vastai-fleet --version
          ./artifacts/vastai-fleet --help | grep -q self-destroy
          ./artifacts/vastai-fleet self-destroy --help | grep -q -- '--error-log'

      - name: Extract short SHA
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha-short=$SHA_SHORT" >> "$GITHUB_OUTPUT"

      - name: Upload binary artifacts for image job
        uses: actions/upload-artifact@v4
        with:
          name: sweep-binaries
          path: |
            artifacts/zen-metrics
            artifacts/zen-sweep-worker
            artifacts/vastai-fleet
          retention-days: 7

  build-image:
    name: Build + push sweep image
    runs-on: ubuntu-latest
    needs: build-binary
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download sweep binaries
        uses: actions/download-artifact@v4
        with:
          name: sweep-binaries
          path: ./
      - run: |
          chmod +x ./zen-metrics ./zen-sweep-worker ./vastai-fleet
          ./zen-metrics --version
          ./zen-sweep-worker --version
          ./vastai-fleet --version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          SHA_SHORT="${{ needs.build-binary.outputs.sha-short }}"
          TAGS="${IMAGE_NAME}:v26-${SHA_SHORT}"
          if [ "${{ github.ref }}" = "refs/heads/master" ] || [ "${{ github.ref }}" = "refs/heads/main" ]; then
              TAGS="${TAGS},${IMAGE_NAME}:v26"
          fi
          if [[ "${{ github.ref }}" == refs/tags/zen-metrics-cli-v* ]]; then
              VERSION="${GITHUB_REF#refs/tags/zen-metrics-cli-v}"
              TAGS="${TAGS},${IMAGE_NAME}:v26-${VERSION}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Tags: $TAGS"

      - name: Build + push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.sweep.v26
          build-args: |
            ZEN_METRICS_BINARY=./zen-metrics
            ZEN_SWEEP_WORKER_BINARY=./zen-sweep-worker
            VASTAI_FLEET_BINARY=./vastai-fleet
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # Cache the base layer (L1-L7 ~530 MB) across runs. registry
          # cache means we don't re-apt-install python+cuda+helpers or
          # recompile cuda_dlsym_stub.so on every push, only when the
          # base RUN steps change.
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-v26
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-v26,mode=max
          # No layer should reference the build-binary stage so the
          # final image is small. Only stable runtime layers + binary +
          # scripts.
          provenance: false

      - name: Verify pushed image
        run: |
          docker pull ${IMAGE_NAME}:v26-${{ needs.build-binary.outputs.sha-short }}
          docker run --rm --entrypoint /usr/local/bin/zen-metrics \
              ${IMAGE_NAME}:v26-${{ needs.build-binary.outputs.sha-short }} \
              --version
          docker run --rm --entrypoint /usr/local/bin/zen-metrics \
              ${IMAGE_NAME}:v26-${{ needs.build-binary.outputs.sha-short }} \
              score-pairs --help | grep -q allow-small-images
          docker run --rm --entrypoint /usr/local/bin/zen-sweep-worker \
              ${IMAGE_NAME}:v26-${{ needs.build-binary.outputs.sha-short }} \
              worker --help | grep -q -- '--mode'
          docker run --rm --entrypoint /usr/local/bin/vastai-fleet \
              ${IMAGE_NAME}:v26-${{ needs.build-binary.outputs.sha-short }} \
              self-destroy --help | grep -q -- '--error-log'
          echo "Image OK: ${IMAGE_NAME}:v26-${{ needs.build-binary.outputs.sha-short }}"
