name: Image secret scan

# Scans EVERY published ghcr.io/imazen container image for LEAKED CREDENTIALS.
# These images are PUBLIC (world-pullable) so a baked credential is a public leak.
#
# Three triggers, one job:
#   * workflow_run — fires right after the image-build workflows finish, so a leak
#                    in a freshly-built image is caught within minutes of push.
#   * schedule     — daily full sweep (catches images built out-of-band, e.g. the
#                    manual kadis build_sweep_kadis.sh, and any tag pushed by hand).
#   * workflow_dispatch — on demand (inputs to widen scope / target one package).
#
# On a finding the job FAILS and opens/updates a tracking issue assigned to lilith.
# Read-only on the registry: never pushes, retags, or deletes. Companion to
# ghcr-guard.yml (which guards package NAMES); this guards package CONTENTS.

on:
  workflow_run:
    workflows: ["zenfleet-worker base tags", "Job-worker fleet image"]
    types: [completed]
  schedule:
    - cron: "37 6 * * *"        # daily 06:37 UTC
  workflow_dispatch:
    inputs:
      scope:
        description: "recent (newest tags/pkg) or all (every tagged digest)"
        type: choice
        options: [recent, all]
        default: recent
      only_packages:
        description: "comma list to limit (blank = every package)"
        type: string
        default: ""

permissions:
  contents: read
  packages: read
  issues: write

concurrency:
  group: image-secret-scan
  cancel-in-progress: false

jobs:
  scan:
    name: Scan ghcr.io/imazen images for leaked credentials
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install trufflehog + crane (pinned, no boot-time guesswork)
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b "$HOME/.local/bin" v3.90.8
          CRANE_VER=v0.20.6
          curl -sSfL "https://github.com/google/go-containerregistry/releases/download/${CRANE_VER}/go-containerregistry_Linux_x86_64.tar.gz" \
            | tar -xz -C "$HOME/.local/bin" crane
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/trufflehog" --version
          "$HOME/.local/bin/crane" version

      - name: Log in to ghcr.io (avoids anon rate limits; public still works without)
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: printf '%s' "$GHCR_TOKEN" | crane auth login ghcr.io -u "$GHCR_USER" --password-stdin

      - name: Scan all published imazen images
        id: scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCAN_SCOPE: ${{ github.event.inputs.scope || 'recent' }}
          ONLY_PACKAGES: ${{ github.event.inputs.only_packages || '' }}
        run: |
          set -o pipefail
          python3 scripts/ci/scan_all_ghcr_images.py 2>&1 | tee /tmp/scan.log
          echo "rc=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Open / update leak issue (only on a finding)
        if: failure() && steps.scan.outputs.rc == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="SECURITY: leaked credential detected in a public ghcr.io/imazen image"
          BODY="$(mktemp)"
          {
            echo "An automated scan (\`scripts/ci/scan_image_secrets.sh\`) flagged a likely **leaked credential**"
            echo "in a PUBLIC ghcr.io/imazen image. Public images are world-pullable, so this is a public leak."
            echo
            echo "**ACTION REQUIRED — a human must ROTATE the exposed credential** (do not just delete the image)."
            echo "Then retag/repush a clean image and delete the leaking tag."
            echo
            echo "Run: $RUN_URL"
            echo
            echo '```'
            grep -E '::error::|FINDING|scan |RESULT|>>> scan' /tmp/scan.log | tail -60 || tail -60 /tmp/scan.log
            echo '```'
          } > "$BODY"
          EXISTING="$(gh issue list --repo "$REPO" --state open \
                        --search "in:title $TITLE" --json number --jq '.[0].number' || true)"
          if [ -n "${EXISTING:-}" ] && [ "$EXISTING" != "null" ]; then
            gh issue comment "$EXISTING" --repo "$REPO" --body-file "$BODY"
          else
            gh issue create --repo "$REPO" --title "$TITLE" \
              --body-file "$BODY" --label security --assignee lilith || \
            gh issue create --repo "$REPO" --title "$TITLE" \
              --body-file "$BODY" --assignee lilith
          fi
