  #   name: crates.io publish
  #   runs-on: ubuntu-latest
  #   needs: github-release
  #   if: startsWith(github.ref, 'refs/tags/')
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: dtolnay/rust-toolchain@stable
