name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CI: true

defaults:
  run:
    shell: bash

jobs:
  # Workspace-wide compile check across the platforms CLAUDE.md mandates:
  # linux-x86_64, windows-11-arm, macos-15-intel, macos-26-intel.
  # We compile with the WGPU backend (no system CUDA needed) so this works
  # on every runner without per-OS toolchain setup.
  compile:
    name: Compile (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest        # linux-x86_64
          - windows-latest       # windows-x86_64
          - windows-11-arm       # windows-arm64 (per CLAUDE.md)
          - macos-15-intel       # macos-x86_64
          - macos-26-intel       # macos-x86_64 (newer image)
          - macos-latest         # macos-aarch64
    steps:
      - uses: actions/checkout@v4
      - name: Clone sibling-repo path-dep targets (zenjpeg, zenanalyze)
        # zen-metrics-cli's Cargo.toml has `zenjpeg = { path =
        # "../../../zenjpeg/zenjpeg", optional = true }`. Even though
        # it's optional, cargo validates the path during workspace
        # manifest load. zenjpeg itself has `zenpredict = { path =
        # "../../zenanalyze/zenpredict" }` so we need zenanalyze too.
        # Pin to known-good origin HEAD commits for reproducibility.
        run: |
          git clone --quiet https://github.com/imazen/zenjpeg.git ../zenjpeg
          git -C ../zenjpeg checkout 582bf0efe3d2804617a5b007567463fcc9d1b433
          git clone --quiet https://github.com/imazen/zenanalyze.git ../zenanalyze
          git -C ../zenanalyze checkout 8cae13b962fc1edbef0dc02e7c0cb6775351638f
          # jxl-encoder path dep on `../jxl-encoder/jxl-encoder` (from
          # zenmetrics workspace root) — pulled in by zen-metrics-cli's
          # `sweep` feature transitively. Pin to a stable rev for CI
          # reproducibility.
          git clone --quiet https://github.com/imazen/jxl-encoder.git ../jxl-encoder
          git -C ../jxl-encoder checkout 3d879dd71844681e62652e20ac393b8c54230ba2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: zenmetrics-${{ matrix.os }}
      - name: Build workspace (wgpu + cpu, build-only)
        # Disabled until 2026-05-26 because `[profile.release]` carried
        # `lto = "fat"` + `debug = "full"` + `codegen-units = 1`, which
        # OOM'd the 16 GB ubuntu-latest runner at the final LTO link.
        # Workspace profile now uses thin LTO + line-tables-only debug
        # + cu=16 (task #59) — peak LTO link RSS dropped ~74% per
        # local measurement on the 7950X sandbox. If this step OOMs
        # again, run `cargo build --release --workspace ...` locally
        # with `/usr/bin/time -v` to capture peak RSS and check
        # whether a new heavy member (cubecl backend? trie of generic
        # GPU kernels?) regressed the link memory.
        run: cargo build --workspace --no-default-features --features cuda --release --all-targets
        if: matrix.os == 'ubuntu-latest'
      - name: Build all -gpu crates (wgpu only)
        run: |
          cargo build -p butteraugli-gpu --no-default-features --features wgpu --release
          cargo build -p ssim2-gpu       --no-default-features --features wgpu --release
          cargo build -p dssim-gpu       --no-default-features --features wgpu --release
          cargo build -p zensim-gpu      --no-default-features --features wgpu --release
          cargo build -p cvvdp-gpu       --no-default-features --features wgpu --release
      - name: Build + test cvvdp-cpu (pure CPU, no GPU runtime required)
        run: |
          cargo build -p cvvdp-cpu --release
          cargo build -p cvvdp-cpu --no-default-features --features "alloc parallel" --release
          cargo test  -p cvvdp-cpu --release
      - name: Build CLI (CPU metrics only — no GPU runtime needed at compile time)
        run: cargo build -p zen-metrics-cli --no-default-features --features cpu-metrics --release

  # i686-unknown-linux-gnu cross-compilation per CLAUDE.md ("i686 is a
  # primary target — 32-bit correctness matters for WASM compatibility
  # and catching pointer-width bugs"). cubecl 0.10's CUDA backend pulls
  # in 64-bit-only deps, so we restrict to wgpu-only on i686.
  i686-cross:
    name: i686 cross-compile (wgpu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone sibling-repo path-dep targets (zenjpeg, zenanalyze)
        # zen-metrics-cli's Cargo.toml has `zenjpeg = { path =
        # "../../../zenjpeg/zenjpeg", optional = true }`. Even though
        # it's optional, cargo validates the path during workspace
        # manifest load. zenjpeg itself has `zenpredict = { path =
        # "../../zenanalyze/zenpredict" }` so we need zenanalyze too.
        # Pin to known-good origin HEAD commits for reproducibility.
        run: |
          git clone --quiet https://github.com/imazen/zenjpeg.git ../zenjpeg
          git -C ../zenjpeg checkout 582bf0efe3d2804617a5b007567463fcc9d1b433
          git clone --quiet https://github.com/imazen/zenanalyze.git ../zenanalyze
          git -C ../zenanalyze checkout 8cae13b962fc1edbef0dc02e7c0cb6775351638f
          # jxl-encoder path dep on `../jxl-encoder/jxl-encoder` (from
          # zenmetrics workspace root) — pulled in by zen-metrics-cli's
          # `sweep` feature transitively. Pin to a stable rev for CI
          # reproducibility.
          git clone --quiet https://github.com/imazen/jxl-encoder.git ../jxl-encoder
          git -C ../jxl-encoder checkout 3d879dd71844681e62652e20ac393b8c54230ba2
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cross
        run: cargo install --locked cross
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: zenmetrics-i686
      - name: Cross-compile (wgpu)
        run: |
          cross build --target i686-unknown-linux-gnu \
            -p butteraugli-gpu \
            -p ssim2-gpu \
            -p dssim-gpu \
            -p zensim-gpu \
            -p cvvdp-gpu \
            -p zenmetrics-corpus \
            --no-default-features --features wgpu --release
      - name: Cross-compile cvvdp-cpu (no GPU deps — pure CPU port)
        run: |
          cross build --target i686-unknown-linux-gnu \
            -p cvvdp-cpu --release
          cross test  --target i686-unknown-linux-gnu \
            -p cvvdp-cpu --release

  # Runtime parity tests on macOS via Metal (the only CI-available GPU
  # runtime). Disable `fast-reduction` everywhere — Metal silently
  # no-ops Atomic<f32>::fetch_add (gotcha G3.x); the portable two-stage
  # reduction is what actually works.
  metal-tests:
    name: Metal tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-26-intel]
    steps:
      - uses: actions/checkout@v4
      - name: Clone sibling-repo path-dep targets (zenjpeg, zenanalyze)
        # zen-metrics-cli's Cargo.toml has `zenjpeg = { path =
        # "../../../zenjpeg/zenjpeg", optional = true }`. Even though
        # it's optional, cargo validates the path during workspace
        # manifest load. zenjpeg itself has `zenpredict = { path =
        # "../../zenanalyze/zenpredict" }` so we need zenanalyze too.
        # Pin to known-good origin HEAD commits for reproducibility.
        run: |
          git clone --quiet https://github.com/imazen/zenjpeg.git ../zenjpeg
          git -C ../zenjpeg checkout 582bf0efe3d2804617a5b007567463fcc9d1b433
          git clone --quiet https://github.com/imazen/zenanalyze.git ../zenanalyze
          git -C ../zenanalyze checkout 8cae13b962fc1edbef0dc02e7c0cb6775351638f
          # jxl-encoder path dep on `../jxl-encoder/jxl-encoder` (from
          # zenmetrics workspace root) — pulled in by zen-metrics-cli's
          # `sweep` feature transitively. Pin to a stable rev for CI
          # reproducibility.
          git clone --quiet https://github.com/imazen/jxl-encoder.git ../jxl-encoder
          git -C ../jxl-encoder checkout 3d879dd71844681e62652e20ac393b8c54230ba2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: zenmetrics-metal-${{ matrix.os }}
      - name: GPU info
        run: system_profiler SPDisplaysDataType | head -40 || true
      - name: butteraugli-gpu parity
        if: always()
        run: cargo test -p butteraugli-gpu --no-default-features --features wgpu --release
      - name: ssim2-gpu parity
        if: always()
        run: cargo test -p ssim2-gpu --no-default-features --features wgpu --release
      - name: dssim-gpu parity
        if: always()
        run: cargo test -p dssim-gpu --no-default-features --features wgpu --release
      - name: zensim-gpu parity
        if: always()
        run: cargo test -p zensim-gpu --no-default-features --features wgpu --release

  # Compile-only doctest pass — catches the doc examples in lib.rs that
  # reference `WgpuRuntime` etc. CUDA-only environments would skip these,
  # so we run them on macOS.
  doctests:
    name: Doctests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone sibling-repo path-dep targets (zenjpeg, zenanalyze)
        # zen-metrics-cli's Cargo.toml has `zenjpeg = { path =
        # "../../../zenjpeg/zenjpeg", optional = true }`. Even though
        # it's optional, cargo validates the path during workspace
        # manifest load. zenjpeg itself has `zenpredict = { path =
        # "../../zenanalyze/zenpredict" }` so we need zenanalyze too.
        # Pin to known-good origin HEAD commits for reproducibility.
        run: |
          git clone --quiet https://github.com/imazen/zenjpeg.git ../zenjpeg
          git -C ../zenjpeg checkout 582bf0efe3d2804617a5b007567463fcc9d1b433
          git clone --quiet https://github.com/imazen/zenanalyze.git ../zenanalyze
          git -C ../zenanalyze checkout 8cae13b962fc1edbef0dc02e7c0cb6775351638f
          # jxl-encoder path dep on `../jxl-encoder/jxl-encoder` (from
          # zenmetrics workspace root) — pulled in by zen-metrics-cli's
          # `sweep` feature transitively. Pin to a stable rev for CI
          # reproducibility.
          git clone --quiet https://github.com/imazen/jxl-encoder.git ../jxl-encoder
          git -C ../jxl-encoder checkout 3d879dd71844681e62652e20ac393b8c54230ba2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: zenmetrics-doctests
      - name: Run doctests
        run: cargo test --workspace --no-default-features --features wgpu --doc --release

  # Linting + formatting.
  lint:
    name: Lint (clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone sibling-repo path-dep targets (zenjpeg, zenanalyze)
        # zen-metrics-cli's Cargo.toml has `zenjpeg = { path =
        # "../../../zenjpeg/zenjpeg", optional = true }`. Even though
        # it's optional, cargo validates the path during workspace
        # manifest load. zenjpeg itself has `zenpredict = { path =
        # "../../zenanalyze/zenpredict" }` so we need zenanalyze too.
        # Pin to known-good origin HEAD commits for reproducibility.
        run: |
          git clone --quiet https://github.com/imazen/zenjpeg.git ../zenjpeg
          git -C ../zenjpeg checkout 582bf0efe3d2804617a5b007567463fcc9d1b433
          git clone --quiet https://github.com/imazen/zenanalyze.git ../zenanalyze
          git -C ../zenanalyze checkout 8cae13b962fc1edbef0dc02e7c0cb6775351638f
          # jxl-encoder path dep on `../jxl-encoder/jxl-encoder` (from
          # zenmetrics workspace root) — pulled in by zen-metrics-cli's
          # `sweep` feature transitively. Pin to a stable rev for CI
          # reproducibility.
          git clone --quiet https://github.com/imazen/jxl-encoder.git ../jxl-encoder
          git -C ../jxl-encoder checkout 3d879dd71844681e62652e20ac393b8c54230ba2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: zenmetrics-lint
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (-D warnings, workspace-wide)
        run: cargo clippy --workspace --no-default-features --features wgpu -- -D warnings
