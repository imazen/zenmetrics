          # root). On CI we clone the workspace repo into
          # ../../butteraugli so that ../../butteraugli/butteraugli/
          # is the package dir.
          git clone --quiet https://github.com/imazen/butteraugli.git ../../butteraugli
          git -C ../../butteraugli checkout 8e2271151e6d7b4a45ada18cdfbf2bd061d17460
          # fast-ssim2 (zen-metrics-cli path dep `../../../fast-ssim2/fast-ssim2`
          # AND root [patch.crates-io] source for zenmetrics-api/-orchestrator —
          # the `hdr-pu` integrated-PU21 entry the CPU ssim2 HDR routing calls is
          # git-main-only, crates.io 0.8.1 predates it) and dssim (root
          # [patch.crates-io] dssim-core = `../../dssim/dssim-core`) are loaded
          # by `cargo metadata` for the whole workspace, so they must be cloned
          # even when a job doesn't compile them. Pinned to the revs the local
          # workspace builds against (stable, fetchable). The fast-ssim2 pin must
          # carry `hdr-pu` + `compute_ssimulacra2_pu_nits` (35f198af or later).
          git clone --quiet https://github.com/imazen/fast-ssim2.git ../fast-ssim2
          git -C ../fast-ssim2 checkout 8c9b16d2f4ab6055bfa22d8b4a079a8778f285ec
          git clone --quiet https://github.com/lilith/dssim.git ../../dssim
          git -C ../../dssim checkout eec33f556d7ee991c4b906198c3a1b74f6f6063d
          # zen-metrics-cli's `hdr` feature path-deps (`../../../ultrahdr/...`
          # and `../../../heic`). OFF in every CI build below, but cargo
          # validates optional path-dep paths during workspace manifest load,
          # so they must exist. ultrahdr-core has an optional `zentone`
          # path-dep (`../../zentone`); clone it too. ultrahdr's workspace
          # root pulls `../zenjpeg/zenjpeg` (already cloned above). heic is
          # pinned to the ISO 21496-1 tmap-preference fix.
          git clone --quiet https://github.com/imazen/ultrahdr.git ../ultrahdr
          git -C ../ultrahdr checkout a45314867a8220ce43a1b716f5a1aa35fe2ae882
          git clone --quiet https://github.com/imazen/heic.git ../heic
          git -C ../heic checkout 738f177e8cfe90aa992661f8c381e2f07c446c8d
          git clone --quiet https://github.com/imazen/zentone.git ../zentone
          git -C ../zentone checkout f9f50e49e79561be9b0826407b637da50fa5070f
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: zenmetrics-cpu-metrics
      - name: Backend::Cpu dispatch + backend×metric×size matrix
        run: |
          cargo test -p zenmetrics-api \
            --no-default-features \
            --features all-metrics,cpu-metrics,wgpu,pixels,encoded \
            --test it -- backend_matrix cpu_dispatch cpu_ssim2_pu cpu_zensim_pu

