name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CI: true

defaults:
  run:
    shell: bash

# Superseded runs only waste runner queue — particularly the macOS
# jobs, which wait on GitHub's scarcest pool. Only the newest
# commit's run matters per ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Workspace-wide compile check across the platforms CLAUDE.md mandates:
  # linux-x86_64, windows-11-arm, macos-15-intel, macos-26-intel.
  # We compile with the WGPU backend (no system CUDA needed) so this works
  # on every runner without per-OS toolchain setup.
  compile:
    name: Compile (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest        # linux-x86_64
          - windows-latest       # windows-x86_64
          - windows-11-arm       # windows-arm64 (per CLAUDE.md)
          - macos-15-intel       # macos-x86_64
          - macos-26-intel       # macos-x86_64 (newer image)
          - macos-latest         # macos-aarch64
    steps:
      - uses: actions/checkout@v4
      - name: Clone sibling-repo path-dep targets (zenjpeg, zenanalyze)
        # zen-metrics-cli's Cargo.toml has `zenjpeg = { path =
        # "../../../zenjpeg/zenjpeg", optional = true }`. Even though
        # it's optional, cargo validates the path during workspace
        # manifest load. zenjpeg itself has `zenpredict = { path =
        # "../../zenanalyze/zenpredict" }` so we need zenanalyze too.
        # Pin to known-good origin HEAD commits for reproducibility.
        run: |
          git clone --quiet https://github.com/imazen/zenjpeg.git ../zenjpeg
          git -C ../zenjpeg checkout 94fb6ec6ee3baf9f52982f41cbc56dd0792bb34c
          git clone --quiet https://github.com/imazen/zenanalyze.git ../zenanalyze
          git -C ../zenanalyze checkout 8642fa1a0be74643e63737e7acda1d242271562e
          # jxl-encoder path dep on `../jxl-encoder/jxl-encoder` (from
          # zenmetrics workspace root) — pulled in by zen-metrics-cli's
          # `sweep` feature transitively. Pin to a stable rev for CI
          # reproducibility.
          git clone --quiet --no-checkout https://github.com/imazen/jxl-encoder.git ../jxl-encoder
          # jxl-encoder commits sweep PNGs under benchmarks/ with names invalid
          # on NTFS (contain '>'), which break Windows checkout. Sparse-checkout
          # everything except benchmarks/ — no workspace member lives there, so
          # the build is unaffected (and the clone is smaller/faster).
          git -C ../jxl-encoder sparse-checkout init --no-cone
          git -C ../jxl-encoder sparse-checkout set '/*' '!/benchmarks/'
          # core.protectNTFS rejects the '>' index entries during checkout
          # before skip-worktree applies; disable it so sparse can skip them.
          git -C ../jxl-encoder -c core.protectNTFS=false checkout cb0c3a193792d7562ffc92b06e332b1cd661ca36
          # Workspace [patch.crates-io] entries point at local siblings
          # for every codec we ship (zenpng, zenwebp, zenavif,
          # zenjxl, zensim/zensim) and butteraugli. Cargo loads
          # every patch manifest even when the patched crate isn't
          # active in the build, so CI must clone them all to satisfy
          # workspace metadata resolution. Pinned to stable revs to
          # make CI reproducible.
          git clone --quiet https://github.com/imazen/zenpng.git ../zenpng
          git -C ../zenpng checkout 2e82aa94077983d9c193aa80a3aac7c3a16972d4
          git clone --quiet https://github.com/imazen/zenwebp.git ../zenwebp
          git -C ../zenwebp checkout 700aa4a84d04d25ab1cf89c33ea1e4bc52f4be20
          # zenavif/zenjxl are patched at `../zenavif` / `../zenjxl` (the
          # `--main` suffix was dropped in b286abb4 / c8c2f923 — keep the
          # clone dirs matching the workspace [patch] paths).
          git clone --quiet https://github.com/imazen/zenavif.git ../zenavif
          git -C ../zenavif checkout e9de3022d7e9294e5dae19b595876d441c9bc135
          git clone --quiet https://github.com/imazen/zenjxl.git ../zenjxl
          git -C ../zenjxl checkout 4c0d672f6d7db01d7bd57d6452e3ba6946d6e7df
          # zenjxl-decoder is no longer a sibling-path patch: the workspace
          # [patch.crates-io] pins a git rev directly (see Cargo.toml patch
          # comment), so cargo fetches it itself — no clone needed here.
          git clone --quiet https://github.com/imazen/zensim.git ../zensim
          git -C ../zensim checkout 062bb3cedfbb6e723235044fb0818efaaa493d93
          # butteraugli's local layout is a Cargo workspace at
          # ~/work/butteraugli/ with the package at
          # ~/work/butteraugli/butteraugli/. The workspace's
          # [patch.crates-io] points at the *package* path
          # (../../butteraugli/butteraugli from zenmetrics' workspace
          # root). On CI we clone the workspace repo into
          # ../../butteraugli so that ../../butteraugli/butteraugli/
          # is the package dir.
          git clone --quiet https://github.com/imazen/butteraugli.git ../../butteraugli
          git -C ../../butteraugli checkout 8e2271151e6d7b4a45ada18cdfbf2bd061d17460
          # fast-ssim2 (zen-metrics-cli path dep `../../../fast-ssim2/fast-ssim2`
          # AND root [patch.crates-io] source for zenmetrics-api/-orchestrator —
          # the `hdr-pu` integrated-PU21 entry the CPU ssim2 HDR routing calls is
          # git-main-only, crates.io 0.8.1 predates it) and dssim (root
          # [patch.crates-io] dssim-core = `../../dssim/dssim-core`) are loaded
          # by `cargo metadata` for the whole workspace, so they must be cloned
          # even when a job doesn't compile them. Pinned to the revs the local
          # workspace builds against (stable, fetchable). The fast-ssim2 pin must
          # carry `hdr-pu` + `compute_ssimulacra2_pu_nits` (35f198af or later).
          git clone --quiet https://github.com/imazen/fast-ssim2.git ../fast-ssim2
          git -C ../fast-ssim2 checkout 8c9b16d2f4ab6055bfa22d8b4a079a8778f285ec
          git clone --quiet https://github.com/lilith/dssim.git ../../dssim
          git -C ../../dssim checkout eec33f556d7ee991c4b906198c3a1b74f6f6063d
          # zen-metrics-cli's `hdr` feature path-deps (`../../../ultrahdr/...`
          # and `../../../heic`). OFF in every CI build below, but cargo
          # validates optional path-dep paths during workspace manifest load,
          # so they must exist. ultrahdr-core has an optional `zentone`
          # path-dep (`../../zentone`); clone it too. ultrahdr's workspace
          # root pulls `../zenjpeg/zenjpeg` (already cloned above). heic is
          # pinned to the ISO 21496-1 tmap-preference fix.
          git clone --quiet https://github.com/imazen/ultrahdr.git ../ultrahdr
          git -C ../ultrahdr checkout a45314867a8220ce43a1b716f5a1aa35fe2ae882
          git clone --quiet https://github.com/imazen/heic.git ../heic
          git -C ../heic checkout 738f177e8cfe90aa992661f8c381e2f07c446c8d
          git clone --quiet https://github.com/imazen/zentone.git ../zentone
          git -C ../zentone checkout f9f50e49e79561be9b0826407b637da50fa5070f
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: zenmetrics-${{ matrix.os }}
      - name: Build workspace (wgpu + cpu, build-only)
        # Disabled until 2026-05-26 because `[profile.release]` carried
        # `lto = "fat"` + `debug = "full"` + `codegen-units = 1`, which
        # OOM'd the 16 GB ubuntu-latest runner at the final LTO link.
        # Workspace profile now uses thin LTO + line-tables-only debug
        # + cu=16 (task #59) — peak LTO link RSS dropped ~74% per
        # local measurement on the 7950X sandbox. If this step OOMs
        # again, run `cargo build --release --workspace ...` locally
        # with `/usr/bin/time -v` to capture peak RSS and check
        # whether a new heavy member (cubecl backend? trie of generic
        # GPU kernels?) regressed the link memory.
        run: cargo build --workspace --no-default-features --features cuda,all-metrics --release --all-targets
        if: matrix.os == 'ubuntu-latest'
      - name: Build all -gpu crates (wgpu only)
        run: |
          cargo build -p butteraugli-gpu --no-default-features --features wgpu --release
          cargo build -p ssim2-gpu       --no-default-features --features wgpu --release
          cargo build -p dssim-gpu       --no-default-features --features wgpu --release
          cargo build -p zensim-gpu      --no-default-features --features wgpu --release
          cargo build -p cvvdp-gpu       --no-default-features --features wgpu --release
      - name: Build + test cvvdp pure-CPU (renamed from cvvdp-cpu; no GPU runtime)
        run: |
          cargo build -p cvvdp --release
          cargo build -p cvvdp --no-default-features --features "alloc parallel" --release
          cargo test  -p cvvdp --release
      - name: Build CLI (CPU metrics only — no GPU runtime needed at compile time)
        run: cargo build -p zen-metrics-cli --no-default-features --features cpu-metrics --release

  # Runtime parity tests on macOS via Metal (the only CI-available GPU
  # runtime). Disable `fast-reduction` everywhere — Metal silently
  # no-ops Atomic<f32>::fetch_add (gotcha G3.x); the portable two-stage
  # reduction is what actually works. Root cause + fix tracked in
  # `crates/zenmetrics-api/docs/CUBECL_METAL_ATOMIC_FIX.md` (Phase 8e.4).
  #
  # Runs on macos-latest (Apple Silicon) only — the sole GitHub runner with a
  # real Metal GPU. The Intel-Mac runners (macos-15/26-intel) expose only a
  # 64 MB "Apple Paravirtualized Graphics Device" (per the job's own GPU-info
  # step) on which cubecl-wgpu stalls allocating our multi-scale pyramids —
  # both Intel legs ran 6h05m and hit the default 360-min job ceiling on every
  # push (premium macOS minutes), so they were dropped from this matrix on
  # 2026-06-03 (#20). Intel-Mac coverage is retained by the Compile job, which
  # builds `--all-targets` on macos-15-intel + macos-26-intel.
  metal-tests:
    name: Metal tests (${{ matrix.os }})
    # DISABLED 2026-06-13 — the macos-latest (8 GB unified) GPU wedges on
    # the 12 MP (4000×3000) parity tests: butteraugli-gpu's whole-image
    # score returns 0 (silent OOM) and ssim2-gpu hangs the Metal device
    # hard enough to ride the job timeout, even with RUST_TEST_THREADS=1.
    # This is a runner-capacity / large-image-GPU-memory issue, not a
    # kernel-correctness one (CUDA + Vulkan parity is green). GPU metric
    # parity is covered on CUDA/Vulkan locally + in the gpu-citest job
    # below. Re-enable when the large-image path is capped/fixed for the
    # 8 GB runner — tracked in the zenmetrics#24 Metal stream. See the
    # README "GPU CI / Metal" note.
    if: false
    runs-on: ${{ matrix.os }}
    # Fail-fast safety net (belt-and-suspenders now that Intel is dropped): a
    # future GPU-init regression on macos-latest dies at 40 min instead of
    # riding the default 360-min ceiling. 40 min covers a cold gpu-citest build
    # plus the parity tests (fast when the GPU works).
    timeout-minutes: 40
    env:
      # Serialize test execution on Metal. After the tests/it consolidation
      # (162→9 binaries, 42a107b1) ssim2-gpu's it binary runs 97 tests in one
      # process; with libtest's default parallelism the concurrent Metal
      # context/buffer churn wedges the macos-latest runner — observed since
      # 2026-06-10 as either an indefinite hang in `ssim2-gpu parity` (job
      # rides the timeout) or a host-level shutdown (exit 143 ~3 min into the
      # suite; run 27312175768). Compilation is NOT the cost: gpu-citest
      # builds ssim2-gpu in <2 min. One test at a time keeps exactly the same
      # assertions and converts a wedge into a readable pass/fail.
      RUST_TEST_THREADS: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Clone sibling-repo path-dep targets (zenjpeg, zenanalyze)
        # zen-metrics-cli's Cargo.toml has `zenjpeg = { path =
        # "../../../zenjpeg/zenjpeg", optional = true }`. Even though
        # it's optional, cargo validates the path during workspace
        # manifest load. zenjpeg itself has `zenpredict = { path =
        # "../../zenanalyze/zenpredict" }` so we need zenanalyze too.
        # Pin to known-good origin HEAD commits for reproducibility.
        run: |
          git clone --quiet https://github.com/imazen/zenjpeg.git ../zenjpeg
          git -C ../zenjpeg checkout 94fb6ec6ee3baf9f52982f41cbc56dd0792bb34c
          git clone --quiet https://github.com/imazen/zenanalyze.git ../zenanalyze
          git -C ../zenanalyze checkout 8642fa1a0be74643e63737e7acda1d242271562e
          # jxl-encoder path dep on `../jxl-encoder/jxl-encoder` (from
          # zenmetrics workspace root) — pulled in by zen-metrics-cli's
          # `sweep` feature transitively. Pin to a stable rev for CI
          # reproducibility.
          git clone --quiet --no-checkout https://github.com/imazen/jxl-encoder.git ../jxl-encoder
          # jxl-encoder commits sweep PNGs under benchmarks/ with names invalid
          # on NTFS (contain '>'), which break Windows checkout. Sparse-checkout
          # everything except benchmarks/ — no workspace member lives there, so
          # the build is unaffected (and the clone is smaller/faster).
          git -C ../jxl-encoder sparse-checkout init --no-cone
          git -C ../jxl-encoder sparse-checkout set '/*' '!/benchmarks/'
          # core.protectNTFS rejects the '>' index entries during checkout
          # before skip-worktree applies; disable it so sparse can skip them.
          git -C ../jxl-encoder -c core.protectNTFS=false checkout cb0c3a193792d7562ffc92b06e332b1cd661ca36
          # Workspace [patch.crates-io] entries point at local siblings
          # for every codec we ship (zenpng, zenwebp, zenavif,
          # zenjxl, zensim/zensim) and butteraugli. Cargo loads
          # every patch manifest even when the patched crate isn't
          # active in the build, so CI must clone them all to satisfy
          # workspace metadata resolution. Pinned to stable revs to
          # make CI reproducible.
          git clone --quiet https://github.com/imazen/zenpng.git ../zenpng
          git -C ../zenpng checkout 2e82aa94077983d9c193aa80a3aac7c3a16972d4
          git clone --quiet https://github.com/imazen/zenwebp.git ../zenwebp
          git -C ../zenwebp checkout 700aa4a84d04d25ab1cf89c33ea1e4bc52f4be20
          # zenavif/zenjxl are patched at `../zenavif` / `../zenjxl` (the
          # `--main` suffix was dropped in b286abb4 / c8c2f923 — keep the
          # clone dirs matching the workspace [patch] paths).
          git clone --quiet https://github.com/imazen/zenavif.git ../zenavif
          git -C ../zenavif checkout e9de3022d7e9294e5dae19b595876d441c9bc135
          git clone --quiet https://github.com/imazen/zenjxl.git ../zenjxl
          git -C ../zenjxl checkout 4c0d672f6d7db01d7bd57d6452e3ba6946d6e7df
          # zenjxl-decoder is no longer a sibling-path patch: the workspace
          # [patch.crates-io] pins a git rev directly (see Cargo.toml patch
          # comment), so cargo fetches it itself — no clone needed here.
          git clone --quiet https://github.com/imazen/zensim.git ../zensim
          git -C ../zensim checkout 062bb3cedfbb6e723235044fb0818efaaa493d93
          # butteraugli's local layout is a Cargo workspace at
          # ~/work/butteraugli/ with the package at
          # ~/work/butteraugli/butteraugli/. The workspace's
          # [patch.crates-io] points at the *package* path
          # (../../butteraugli/butteraugli from zenmetrics' workspace
          # root). On CI we clone the workspace repo into
          # ../../butteraugli so that ../../butteraugli/butteraugli/
          # is the package dir.
          git clone --quiet https://github.com/imazen/butteraugli.git ../../butteraugli
          git -C ../../butteraugli checkout 8e2271151e6d7b4a45ada18cdfbf2bd061d17460
          # fast-ssim2 (zen-metrics-cli path dep `../../../fast-ssim2/fast-ssim2`
          # AND root [patch.crates-io] source for zenmetrics-api/-orchestrator —
          # the `hdr-pu` integrated-PU21 entry the CPU ssim2 HDR routing calls is
          # git-main-only, crates.io 0.8.1 predates it) and dssim (root
          # [patch.crates-io] dssim-core = `../../dssim/dssim-core`) are loaded
          # by `cargo metadata` for the whole workspace, so they must be cloned
          # even when a job doesn't compile them. Pinned to the revs the local
          # workspace builds against (stable, fetchable). The fast-ssim2 pin must
          # carry `hdr-pu` + `compute_ssimulacra2_pu_nits` (35f198af or later).
          git clone --quiet https://github.com/imazen/fast-ssim2.git ../fast-ssim2
          git -C ../fast-ssim2 checkout 8c9b16d2f4ab6055bfa22d8b4a079a8778f285ec
          git clone --quiet https://github.com/lilith/dssim.git ../../dssim
          git -C ../../dssim checkout eec33f556d7ee991c4b906198c3a1b74f6f6063d
          # zen-metrics-cli's `hdr` feature path-deps (`../../../ultrahdr/...`
          # and `../../../heic`). OFF in every CI build below, but cargo
          # validates optional path-dep paths during workspace manifest load,
          # so they must exist. ultrahdr-core has an optional `zentone`
          # path-dep (`../../zentone`); clone it too. ultrahdr's workspace
          # root pulls `../zenjpeg/zenjpeg` (already cloned above). heic is
          # pinned to the ISO 21496-1 tmap-preference fix.
          git clone --quiet https://github.com/imazen/ultrahdr.git ../ultrahdr
          git -C ../ultrahdr checkout a45314867a8220ce43a1b716f5a1aa35fe2ae882
          git clone --quiet https://github.com/imazen/heic.git ../heic
          git -C ../heic checkout 738f177e8cfe90aa992661f8c381e2f07c446c8d
          git clone --quiet https://github.com/imazen/zentone.git ../zentone
          git -C ../zentone checkout f9f50e49e79561be9b0826407b637da50fa5070f
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: zenmetrics-metal-${{ matrix.os }}
      - name: GPU info
        run: system_profiler SPDisplaysDataType | head -40 || true
      - name: butteraugli-gpu parity
        if: always()
        # `--tests` runs the parity test targets (lib unit + integration) and
        # skips examples — the cuda-only bench examples (`use cubecl::cuda`) don't
        # compile under wgpu and aren't the parity surface this job validates.
        run: cargo test -p butteraugli-gpu --no-default-features --features wgpu --profile gpu-citest --tests
      - name: ssim2-gpu parity
        if: always()
        # `--tests` runs the parity test targets (lib unit + integration) and
        # skips examples — the cuda-only bench examples (`use cubecl::cuda`) don't
        # compile under wgpu and aren't the parity surface this job validates.
        #
        # ZENMETRICS_GPU_TIMING=1 + `--nocapture`: surface the gpu-core
        # `time_phase` breakdown (`ssim2.compute_with_mode`) so the macos-Metal
        # *runtime* cost is visible in the log. Measured 2026-06-12 (run
        # 27312175768): gpu-citest compiles this crate in <2 min — wall time
        # here is test execution, which is why the job-level
        # RUST_TEST_THREADS=1 serialization matters on this step.
        env:
          ZENMETRICS_GPU_TIMING: "1"
        run: cargo test -p ssim2-gpu --no-default-features --features wgpu --profile gpu-citest --tests -- --nocapture
      - name: dssim-gpu parity
        if: always()
        # `--tests` runs the parity test targets (lib unit + integration) and
        # skips examples — the cuda-only bench examples (`use cubecl::cuda`) don't
        # compile under wgpu and aren't the parity surface this job validates.
        run: cargo test -p dssim-gpu --no-default-features --features wgpu --profile gpu-citest --tests
      - name: zensim-gpu parity
        if: always()
        # `--tests` runs the parity test targets (lib unit + integration) and
        # skips examples — the cuda-only bench examples (`use cubecl::cuda`) don't
        # compile under wgpu and aren't the parity surface this job validates.
        run: cargo test -p zensim-gpu --no-default-features --features wgpu --profile gpu-citest --tests
      - name: iwssim-gpu parity
        # iwssim-gpu has no Atomic<f32> use in its hot path (audited
        # 2026-05-27 as part of Phase 8e.4 — see CUBECL_METAL_ATOMIC_FIX.md),
        # so it's safe to add to the metal-tests matrix even pre-upstream-fix.
        if: always()
        # `--tests` runs the parity test targets (lib unit + integration) and
        # skips examples — the cuda-only bench examples (`use cubecl::cuda`) don't
        # compile under wgpu and aren't the parity surface this job validates.
        run: cargo test -p iwssim-gpu --no-default-features --features wgpu --profile gpu-citest --tests
      # cvvdp-gpu deliberately omitted from metal-tests until the upstream
      # cubecl-wgpu CAS-loop lowering lands. Its production
      # pool_band_3ch_lds_kernel uses Atomic<f32>::fetch_add (every band ×
      # channel commit), so Metal scores collapse to the default JOD value.
      # The lib.rs module-doc directs Metal users to compute_dkl_jod_host_pool
      # which reads bands back to host before pooling. Re-enable here once
      # the workspace cubecl pin bumps to a fork rev with
      # feat/metal-atomic-fix.

  # Compile-only doctest pass — catches the doc examples in lib.rs that
  # reference `WgpuRuntime` etc. CUDA-only environments would skip these,
  # so we run them on macOS.
  doctests:
    name: Doctests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone sibling-repo path-dep targets (zenjpeg, zenanalyze)
        # zen-metrics-cli's Cargo.toml has `zenjpeg = { path =
        # "../../../zenjpeg/zenjpeg", optional = true }`. Even though
        # it's optional, cargo validates the path during workspace
        # manifest load. zenjpeg itself has `zenpredict = { path =
        # "../../zenanalyze/zenpredict" }` so we need zenanalyze too.
        # Pin to known-good origin HEAD commits for reproducibility.
        run: |
          git clone --quiet https://github.com/imazen/zenjpeg.git ../zenjpeg
          git -C ../zenjpeg checkout 94fb6ec6ee3baf9f52982f41cbc56dd0792bb34c
          git clone --quiet https://github.com/imazen/zenanalyze.git ../zenanalyze
          git -C ../zenanalyze checkout 8642fa1a0be74643e63737e7acda1d242271562e
          # jxl-encoder path dep on `../jxl-encoder/jxl-encoder` (from
          # zenmetrics workspace root) — pulled in by zen-metrics-cli's
          # `sweep` feature transitively. Pin to a stable rev for CI
          # reproducibility.
          git clone --quiet --no-checkout https://github.com/imazen/jxl-encoder.git ../jxl-encoder
          # jxl-encoder commits sweep PNGs under benchmarks/ with names invalid
          # on NTFS (contain '>'), which break Windows checkout. Sparse-checkout
          # everything except benchmarks/ — no workspace member lives there, so
          # the build is unaffected (and the clone is smaller/faster).
          git -C ../jxl-encoder sparse-checkout init --no-cone
          git -C ../jxl-encoder sparse-checkout set '/*' '!/benchmarks/'
          # core.protectNTFS rejects the '>' index entries during checkout
          # before skip-worktree applies; disable it so sparse can skip them.
          git -C ../jxl-encoder -c core.protectNTFS=false checkout cb0c3a193792d7562ffc92b06e332b1cd661ca36
          # Workspace [patch.crates-io] entries point at local siblings
          # for every codec we ship (zenpng, zenwebp, zenavif,
          # zenjxl, zensim/zensim) and butteraugli. Cargo loads
          # every patch manifest even when the patched crate isn't
          # active in the build, so CI must clone them all to satisfy
          # workspace metadata resolution. Pinned to stable revs to
          # make CI reproducible.
          git clone --quiet https://github.com/imazen/zenpng.git ../zenpng
          git -C ../zenpng checkout 2e82aa94077983d9c193aa80a3aac7c3a16972d4
          git clone --quiet https://github.com/imazen/zenwebp.git ../zenwebp
          git -C ../zenwebp checkout 700aa4a84d04d25ab1cf89c33ea1e4bc52f4be20
          # zenavif/zenjxl are patched at `../zenavif` / `../zenjxl` (the
          # `--main` suffix was dropped in b286abb4 / c8c2f923 — keep the
          # clone dirs matching the workspace [patch] paths).
          git clone --quiet https://github.com/imazen/zenavif.git ../zenavif
          git -C ../zenavif checkout e9de3022d7e9294e5dae19b595876d441c9bc135
          git clone --quiet https://github.com/imazen/zenjxl.git ../zenjxl
