        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: zenmetrics-lint
      - name: Format check
        # Scope to in-repo workspace members only — `cargo fmt --all` reaches
        # into the patched sibling repos (../zenavif, …) we don't own and fails
        # on THEIR formatting. `cargo metadata --no-deps` lists exactly this
        # workspace's members (matches the `just fmt-check` recipe).
        run: cargo fmt --check $(cargo metadata --no-deps --format-version 1 | jq -r '.packages[].name | "-p " + .')
      - name: Clippy (-D warnings, workspace-wide)
        # Intentional/precision/cosmetic lints are allowed. Two mechanisms:
        # command-line -A here covers the many non-`warn(clippy::all)` crates;
