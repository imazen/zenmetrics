[workspace]
members = [
    "crates/butteraugli-gpu",
    "crates/cvvdp-gpu",
    "crates/dssim-gpu",
    "crates/iwssim-gpu",
    "crates/ssim2-gpu",
    "crates/vastai-fleet",
    "crates/zen-metrics-cli",
    "crates/zenmetrics-api",
    "crates/zenmetrics-corpus",
    "crates/zensim-gpu",
]
# Excluded: burn-conv-spike is a standalone perf-spike crate that
# pins cubecl 0.10.0 stable (cubek-convolution doesn't accept
# 0.10.0-pre.4). It has its own [workspace] root so it doesn't
# pull workspace settings either.
exclude = [
    "crates/burn-conv-spike",
]
resolver = "2"

[workspace.package]
authors = ["Imazen <support@imazen.io>"]
homepage = "https://github.com/imazen/zenmetrics"
repository = "https://github.com/imazen/zenmetrics"
edition = "2024"
rust-version = "1.93"

[workspace.dependencies]
# Workspace member crates (in-tree).
butteraugli-gpu = { version = "0.0.1", path = "crates/butteraugli-gpu", default-features = false }
cvvdp-gpu = { version = "0.0.1", path = "crates/cvvdp-gpu", default-features = false }
dssim-gpu = { version = "0.0.1", path = "crates/dssim-gpu", default-features = false }
iwssim-gpu = { version = "0.0.1", path = "crates/iwssim-gpu", default-features = false }
ssim2-gpu = { version = "0.0.1", path = "crates/ssim2-gpu", default-features = false }
zensim-gpu = { version = "0.0.1", path = "crates/zensim-gpu", default-features = false }
zenmetrics-api = { version = "0.0.1", path = "crates/zenmetrics-api", default-features = false }
zenmetrics-corpus = { version = "0.1.0", path = "crates/zenmetrics-corpus", default-features = false }

# CubeCL — single source of truth for the GPU backend version.
cubecl = { version = "0.10.0-pre.4", default-features = false, features = ["std"] }

# CPU reference crates used by parity tests.
butteraugli = { version = "0.9.2" }
dssim-core = { version = "3.4", default-features = false }
ssimulacra2 = { version = "0.5" }
zensim = { version = "0.3.0" }

# Common deps.
bytemuck = "1"
clap = { version = "4", default-features = false, features = ["color", "derive", "error-context", "help", "std", "usage", "wrap_help"] }
csv = "1"
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
imgref = "1"
indicatif = "0.17"
rgb = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"

[profile.release]
opt-level = 3
lto = "fat"
debug = "full"
split-debuginfo = "packed"
codegen-units = 1

[profile.bench]
opt-level = 3
lto = "fat"
debug = false
codegen-units = 1

# zensim 0.2.8 isn't on crates.io yet — pin to the main-branch commit
# that adds `compute_extended_features` (needed by the sweep
# subcommand's --feature-output sidecar). Drop this once 0.2.8 ships.
#
# jxl-encoder 0.3.2 (imazen/jxl-encoder#30 — two OOB index DoS
# fixes in entropy_coding/lz77.rs and vardct/patches.rs) is also
# not on crates.io yet — pinning to the main-branch commit that
# contains the merged fix so sweep workers stop crashing at the
# ~17% rate observed in v08/v09/v11. Drop this patch once 0.3.2
# publishes. Same patch applies transitively to zenjxl, which
# pulls jxl-encoder via Cargo.toml.
#
# 2026-05-18 (EXP-MULTI-CODEC): bumped from cb5d9e4 → 6b8eefc1 to
# pick up W44-1..W44-45 bench-driven RD changes on main. User
# explicitly requested "latest main jxlencoder which has a
# different rd than stored data" so the multi-codec sweep
# re-collects with the post-W44 RD curves rather than reusing
# the pre-W44 cached sidecars.
[patch.crates-io]
# Local worktree of feat/principled-activity (HEAD = e16d541a as of
# 2026-05-17) to avoid needing a published zenpredict for the git-rev
# patch to resolve. The sibling worktree is at
# ../zensim--principled-activity which has the zenpredict path dep that
# resolves locally.
#
# Equivalent git ref (use post-merge when the sibling worktree is gone,
# AND after zensim's Cargo.toml has a git-ref zenpredict dep):
#   { git = "https://github.com/imazen/zensim", rev = "e16d541ad752b59c758d5c0cd271eba71f931340" }
zensim = { path = "../zensim--principled-activity/zensim" }
jxl-encoder = { git = "https://github.com/imazen/jxl-encoder", rev = "6b8eefc1563f2bac540ee0be1e1f87c3b14931ed" }
# 2026-05-18 (EXP-MULTI-CODEC): zenjxl 0.2.1 on crates.io was written
# against jxl-encoder 0.3.1 — bumping the jxl-encoder pin above to
# 6b8eefc1 (post-W12-4 a1-audit) adds `premultiplied_alpha` to
# `AnimationParams` and expands `AnimationFrame` with 6 new fields
# (blend_mode, blend_source, save_as_reference, reference_only, name,
# timecode — jxl-encoder commit d0e47838). The wrapper's struct
# literals stopped compiling. Patched at imazen/zenjxl#main
# (commit 9ac0cd5a) where the two struct literals were switched to
# `AnimationParams::default()` + `AnimationFrame::new(...)` so the
# default field values follow upstream as the API evolves. Drop
# once zenjxl 0.2.2 ships with the same fix.
zenjxl = { git = "https://github.com/imazen/zenjxl", rev = "9ac0cd5a4e3d5d335eddcd8bc0e703ed5a3954e4" }
# T4.M (2026-05-16, repointed 2026-05-17): cubecl with pinned-host-buffer
# fast path. `pr/pinned-v0.10.0` on lilith/cubecl cherry-picks
# `create_from_slice_pinned` + default-path pinned-staging routing onto
# the upstream **v0.10.0 release tag** (was 0.10.0-pre.4 prior to this
# repoint). Upstream PR #1030 landed the base `staging()` API in
# v0.10.0 but not these convenience wrappers; PR #1334 (against post-
# v0.10.0 main, which is now 0.11.0-pre.x post-mega-refactor) is the
# upstream submission for the wrappers — drop these patches when that
# lands and we migrate to the next cubecl release.
cubecl = { git = "https://github.com/lilith/cubecl.git", rev = "de2f98573902efe60717cbfc7f8e4f9d630d723e" }
cubecl-runtime = { git = "https://github.com/lilith/cubecl.git", rev = "de2f98573902efe60717cbfc7f8e4f9d630d723e" }
cubecl-core = { git = "https://github.com/lilith/cubecl.git", rev = "de2f98573902efe60717cbfc7f8e4f9d630d723e" }
cubecl-common = { git = "https://github.com/lilith/cubecl.git", rev = "de2f98573902efe60717cbfc7f8e4f9d630d723e" }
cubecl-ir = { git = "https://github.com/lilith/cubecl.git", rev = "de2f98573902efe60717cbfc7f8e4f9d630d723e" }
cubecl-cuda = { git = "https://github.com/lilith/cubecl.git", rev = "de2f98573902efe60717cbfc7f8e4f9d630d723e" }
cubecl-cpu = { git = "https://github.com/lilith/cubecl.git", rev = "de2f98573902efe60717cbfc7f8e4f9d630d723e" }
cubecl-wgpu = { git = "https://github.com/lilith/cubecl.git", rev = "de2f98573902efe60717cbfc7f8e4f9d630d723e" }
cubecl-hip = { git = "https://github.com/lilith/cubecl.git", rev = "de2f98573902efe60717cbfc7f8e4f9d630d723e" }
cubecl-cpp = { git = "https://github.com/lilith/cubecl.git", rev = "de2f98573902efe60717cbfc7f8e4f9d630d723e" }
