[workspace]
members = [
    "crates/butteraugli-gpu",
    "crates/cvvdp-gpu",
    "crates/dssim-gpu",
    "crates/iwssim-gpu",
    "crates/ssim2-gpu",
    "crates/zen-metrics-cli",
    "crates/zenmetrics-corpus",
    "crates/zensim-gpu",
]
# Excluded: burn-conv-spike is a standalone perf-spike crate that
# pins cubecl 0.10.0 stable (cubek-convolution doesn't accept
# 0.10.0-pre.4). It has its own [workspace] root so it doesn't
# pull workspace settings either.
exclude = [
    "crates/burn-conv-spike",
]
resolver = "2"

[workspace.package]
authors = ["Imazen <support@imazen.io>"]
homepage = "https://github.com/imazen/zenmetrics"
repository = "https://github.com/imazen/zenmetrics"
edition = "2024"
rust-version = "1.93"

[workspace.dependencies]
# Workspace member crates (in-tree).
butteraugli-gpu = { version = "0.0.1", path = "crates/butteraugli-gpu", default-features = false }
cvvdp-gpu = { version = "0.0.1", path = "crates/cvvdp-gpu", default-features = false }
dssim-gpu = { version = "0.0.1", path = "crates/dssim-gpu", default-features = false }
iwssim-gpu = { version = "0.0.1", path = "crates/iwssim-gpu", default-features = false }
ssim2-gpu = { version = "0.0.1", path = "crates/ssim2-gpu", default-features = false }
zensim-gpu = { version = "0.0.1", path = "crates/zensim-gpu", default-features = false }
zenmetrics-corpus = { version = "0.1.0", path = "crates/zenmetrics-corpus", default-features = false }

# CubeCL — single source of truth for the GPU backend version.
cubecl = { version = "0.10.0-pre.4", default-features = false, features = ["std"] }

# CPU reference crates used by parity tests.
butteraugli = { version = "0.9.2" }
dssim-core = { version = "3.4", default-features = false }
ssimulacra2 = { version = "0.5" }
zensim = { version = "0.2.8" }

# Common deps.
bytemuck = "1"
clap = { version = "4", default-features = false, features = ["color", "derive", "error-context", "help", "std", "usage", "wrap_help"] }
csv = "1"
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
imgref = "1"
indicatif = "0.17"
rgb = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"

[profile.release]
opt-level = 3
lto = "fat"
debug = "full"
split-debuginfo = "packed"
codegen-units = 1

[profile.bench]
opt-level = 3
lto = "fat"
debug = false
codegen-units = 1

# zensim 0.2.8 isn't on crates.io yet — pin to the main-branch commit
# that adds `compute_extended_features` (needed by the sweep
# subcommand's --feature-output sidecar). Drop this once 0.2.8 ships.
#
# jxl-encoder 0.3.2 (imazen/jxl-encoder#30 — two OOB index DoS
# fixes in entropy_coding/lz77.rs and vardct/patches.rs) is also
# not on crates.io yet — pinning to the main-branch commit that
# contains the merged fix so sweep workers stop crashing at the
# ~17% rate observed in v08/v09/v11. Drop this patch once 0.3.2
# publishes. Same patch applies transitively to zenjxl, which
# pulls jxl-encoder via Cargo.toml.
[patch.crates-io]
zensim = { git = "https://github.com/imazen/zensim", rev = "e295d7fb4098" }
jxl-encoder = { git = "https://github.com/imazen/jxl-encoder", rev = "cb5d9e4" }
# T4.M (2026-05-16): cubecl with pinned-host-buffer fast path
# (`feat/pinned-upload`). Adds `create_from_slice_pinned` AND routes
# the default `create_from_slice` through pinned staging — fixes the
# pageable-memcpy bottleneck that nsys identified at ~40 ms/iter for
# the 48 MB packed dist sRGB upload at 12 MP. Upstream PR
# https://github.com/tracel-ai/cubecl/pull/1030 was closed; this is
# the lilith/cubecl fork until pinned-upload lands upstream.
cubecl = { git = "https://github.com/lilith/cubecl.git", rev = "08d34ac0ba72c0ff1f9351e2f1e4d4ce32db2b0f" }
cubecl-runtime = { git = "https://github.com/lilith/cubecl.git", rev = "08d34ac0ba72c0ff1f9351e2f1e4d4ce32db2b0f" }
cubecl-core = { git = "https://github.com/lilith/cubecl.git", rev = "08d34ac0ba72c0ff1f9351e2f1e4d4ce32db2b0f" }
cubecl-common = { git = "https://github.com/lilith/cubecl.git", rev = "08d34ac0ba72c0ff1f9351e2f1e4d4ce32db2b0f" }
cubecl-ir = { git = "https://github.com/lilith/cubecl.git", rev = "08d34ac0ba72c0ff1f9351e2f1e4d4ce32db2b0f" }
cubecl-cuda = { git = "https://github.com/lilith/cubecl.git", rev = "08d34ac0ba72c0ff1f9351e2f1e4d4ce32db2b0f" }
cubecl-cpu = { git = "https://github.com/lilith/cubecl.git", rev = "08d34ac0ba72c0ff1f9351e2f1e4d4ce32db2b0f" }
cubecl-wgpu = { git = "https://github.com/lilith/cubecl.git", rev = "08d34ac0ba72c0ff1f9351e2f1e4d4ce32db2b0f" }
cubecl-hip = { git = "https://github.com/lilith/cubecl.git", rev = "08d34ac0ba72c0ff1f9351e2f1e4d4ce32db2b0f" }
cubecl-cpp = { git = "https://github.com/lilith/cubecl.git", rev = "08d34ac0ba72c0ff1f9351e2f1e4d4ce32db2b0f" }
