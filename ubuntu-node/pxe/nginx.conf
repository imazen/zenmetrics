worker_processes auto;
events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    # big files (2.9 GB ISO) — allow slow installer fetches, no buffering games
    proxy_buffering off;
    server {
        listen 3080 default_server;
        server_name _;

        # dynamic control endpoints -> the python service (host-networked, localhost:3081)
        location /api/ {
            proxy_pass http://127.0.0.1:3081;
            proxy_set_header Host $host;
            proxy_read_timeout 120s;
        }

        # everything else = static netboot assets (boot.ipxe, ubuntu-26.04/{vmlinuz,initrd}, iso/*)
        # nginx handles HTTP Range natively, so the installer can fetch/resume the ISO reliably.
        location / {
            root /www;
            autoindex on;
        }
    }
}
