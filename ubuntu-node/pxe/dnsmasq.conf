# zen-pxe proxy-DHCP + TFTP. Runs on the tower (192.168.50.170).
#
# PROXY mode: we coexist with the router's DHCP (192.168.50.1). We answer ONLY PXE
# boot questions and never hand out IP leases — the router keeps owning DHCP. Nothing
# on the LAN changes except that PXE-booting machines learn where to fetch iPXE.

port=0                      # not a DNS server
log-dhcp                    # verbose: every PXE exchange is logged (needed to debug first boot)
dhcp-range=192.168.50.0,proxy
dhcp-no-override

enable-tftp
tftp-root=/tftp             # contains undionly.kpxe, ipxe.efi, snponly.efi

# --- client tagging -------------------------------------------------------------
dhcp-match=set:ipxe,175                          # option 175 => this is iPXE (2nd stage)
dhcp-match=set:efi64,option:client-arch,7        # x86_64 UEFI
dhcp-match=set:efi64,option:client-arch,9        # x86_64 UEFI (alt)
dhcp-match=set:efi64,option:client-arch,11       # arm64 UEFI won't hit us; harmless
# arch 0 (legacy BIOS) is the untagged default.

# --- UEFI: PXE-boot GRUB DIRECTLY (no iPXE) --------------------------------------
# Chaining GRUB from iPXE broke two ways: some firmware won't honor iPXE's EFI initrd
# handoff (kernel panics), and GRUB loses ${net_default_mac} when chained. PXE-booting
# GRUB directly fixes both: GRUB loads the initrd itself (all firmware) AND gets its MAC
# from the PXE environment, so it can fetch /api/grub/<mac>.
pxe-service=tag:efi64, x86-64_EFI, "zen-pxe (UEFI/grub)", grubnet.efi
dhcp-boot=tag:efi64,grubnet.efi

# --- BIOS/legacy: still iPXE (undionly.kpxe -> HTTP chain -> /api/boot) -----------
pxe-service=tag:!efi64, x86PC, "zen-pxe (BIOS)", undionly.kpxe
dhcp-boot=tag:!ipxe,tag:!efi64,undionly.kpxe
dhcp-boot=tag:ipxe,http://192.168.50.170:3080/boot.ipxe

# ================================================================================
# IPv6 PXE (RFC 5970). The LAN has no native IPv6, so we advertise a private ULA
# (fd50:50:50::/64) and answer PXE-over-IPv6 with the iPXE binary via TFTP. We are
# explicitly NOT a default router (router-lifetime 0), so this can't hijack routing;
# non-IPv6 devices ignore it entirely. Once iPXE loads it switches to IPv4 for the
# rest of the chain (iPXE's `dhcp` defaults to v4 -> hits the IPv4 rules above).
enable-ra
ra-param=br0,0,0                                   # default RA interval, router-lifetime 0 = NOT a gateway
dhcp-range=fd50:50:50::1000,fd50:50:50::1fff,slaac,64   # stateful pool + SLAAC on the ULA prefix
# UEFI IPv6 PXE only exists for x86_64 — hand it GRUB via TFTP (same as IPv4 UEFI):
dhcp-option=option6:bootfile-url,tftp://[fd50:50:50::1]/grubnet.efi
