insmod efinet
insmod http
insmod linux
insmod normal
insmod net
insmod echo
insmod chain
insmod fat
insmod search
insmod part_gpt
net_bootp
echo zen-grub: ${net_default_mac} -> fetching boot task from tower
configfile (http,192.168.50.170:3080)/api/grub/${net_default_mac}
echo zen-grub: tower unreachable -- booting local OS (no reboot loop)
if search --no-floppy --file --set=root /EFI/Microsoft/Boot/bootmgfw.efi
then chainloader /EFI/Microsoft/Boot/bootmgfw.efi
boot
fi
if search --no-floppy --file --set=root /EFI/ubuntu/shimx64.efi
then chainloader /EFI/ubuntu/shimx64.efi
boot
fi
if search --no-floppy --file --set=root /EFI/BOOT/BOOTX64.EFI
then chainloader /EFI/BOOT/BOOTX64.EFI
boot
fi
echo zen-grub: no local OS bootloader found -- prompt
